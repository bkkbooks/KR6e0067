body:
  text: 唐滄州長者李通玄合論明溫陵長者李贄簡要明吳興後學董廣𥌓閲正第一明依教分宗第二明依宗教別第三明教義差別第四明成佛同別第五明見佛差別第六明說教時分第七明淨土權實第八明攝化境界第九明因果延促第十明會教始終第一明依教分宗者夫如來成道體應真源理事二門一多相徹智境圓寂何法不周只為器有差殊軌儀各異始終漸頓隨根不同設法應宜大小全別時分因果延促不同化佛本身施詮各異國土淨穢增減不同地位因果自有投分創學之流未諳教跡執權成實迷不進修若不咸舉衆宗類其損益無以了其迷滯者矣今略分十法以辨闡獻使得學者知宗遷權就實不滯其行速證菩提一小乘戒經為情有為宗為如來創為凡夫造業處說是應作是不應作捨者善不捨者不善如此立教未為實有如此有教且約凡情虗妄之處橫計諸惡以教制之令生人天是故戒序云若欲生天上及生人中者常當護戒足勿令有毀損衆生有為作業虗妄非實得故生人天無常虗妄非實未得法身智身非為實有宗且為情有宗於小乘中為軌持教也如華嚴經持戒即不然經云身是梵行耶身業四威儀乃至佛法僧十衆七遮和尚羯磨壇場等是梵行耶如是諦觀求梵行者了不可得是故名為清淨梵行如梵行品說如是清淨行者名持佛性戒得佛法身故乃至初發心時便成正覺與佛體齊理事平等混真法界如是持戒不見自身能持戒者不見他身有破戒者非凡夫行非聖賢行不見自身發菩提心不見諸佛成等正覺若好若惡若有少法可得不名菩提不名淨行當如是觀如是性戒即法身也法身者即如來智慧也如來智慧者即正覺也是故不同小乘有取捨故二如梵網經菩薩戒為情有及真俱示為宗如來為凡夫之中有大心衆生樂行慈悲欣求佛果者說盧舍那佛為本身千百億為化身頓令識末還本行經言若人受佛戒即入諸佛位位同大覺已真是諸佛子即為性戒故即為真宗此乃為大心衆生頓示法身性戒下劣者得漸一教應二根如是千百億各接微塵衆俱來至我所明捨權而就實此為實有教雖然立實有宗不同華嚴經毗盧遮那所說此經仍隨化身所化方來至本身也圓教之宗一下頓示本身本法界大智報身因果理事齊彰三般若教為說空彰實為宗為如來初為人天凡夫說二乘教繫著理事俱實不能離障為說空教破所繫著故般若經中說十八種空法世間三寶四諦三世等一切皆空空亦空廣如經說此乃空却無明諸障等業無明總盡障業皆無自性涅槃自然顯著此為真有不名空宗雖然為真有所說教門多有成壞故未可為圓如華嚴經具報相好莊嚴能虗能實當部之內當品之中十十菩薩等上下自相綸貫空有之法不獨孤行又以普賢文殊上下交參理事相徹互相交映一部之典品品相徹句句相參一品之中四十品經同入一言之內十萬之頌齊麾一成即一切成一壞即一切壞總以性齊時齊行齊故如上等齊說法亦齊如是齊故如今成佛與三世佛齊成佛故為無三世故為無時故不同彼教成壞別時故因果前後故四解深密經為不空不有宗如來說於有教空教之後說此一部之教和會有無二見為不空不有即說九識為純淨無染識如瀑水流生多波浪諸波浪等以水為依五六七八等識皆以阿陀那識為依故如彼波浪以水為依深密經云如善鏡面若有一影生緣現前唯一影起若二若多影生緣現前有多影起非此鏡面轉變為影亦無受用滅盡可得此明五六七八識所依第九淨識處也又云如是菩薩雖由法住智為依止為建立故此經意欲令於識處便明識體本唯真智故如彼瀑流不離水體而生波浪又如明鏡依彼淨體無所分別舍多影像不礙有而常無故如是自心所現識相不離本體無作淨智所現影相都無自他內外等執任用隨智無所分別以破空有二繫為不空不有故深密經頌曰阿陀那識甚深細一切種子如瀑流我於凡愚不開演恐彼分別執為我阿陀那識甚深細者引彼凡流就識成智不同二乘及漸始學菩薩破相成空不同凡夫繫而實有不同彼故不空不有何法不空為智能隨緣照機利物故何法不有為智正隨緣時無性相故無生住滅故以是義故名不空不有此經雖復如是於心識之處令知空有無二華嚴經則不然但彰本身本法界一真之根本智佛體用故混真性相法報之海直為上上根人頓示佛果德一真法界本智以為開示悟入之門不論隨妄而生識等是故華嚴教門直彰本體用法界佛果門直授上根凡夫令其悟入不同深密經中安立五六七八九識施設權門如深密經權施第九阿陀那識意有異途為二乘之人久厭惡生死修空滅識直趣空寂及漸學菩薩樂空增勝但有一分慈悲未證法身佛性根本但以空門而為所乘六波羅蜜而為行相初對治門還同二乘無常不淨白骨微塵等觀方入空觀二乘趣滅菩薩留生以空無我等觀折伏我法不令增長以是義故解深密經方便安立七八識外別說九識為純淨識云七八識以淨識為依止故未即直為說第八種子識為如來藏者為彼學徒畏苦習故若說業種恆真生怖難信是故權且安立第九阿陀那識為淨識欲令不滅識性長大菩提故是故維摩經云未具佛法亦不滅受而取證也受既不滅想識亦然如楞伽經直為根熟者說第八識業種為如來藏維摩經云塵勞之疇為如來種大修道之士品類異途解行差殊千端萬別除二乘之外菩薩之乘有四品不同一修空無我菩薩二漸見佛性菩薩三頓見佛性菩薩四以如來自性清淨智以五位加行起差別智滿普賢行成大慈悲菩薩究竟不出剎那際充滿十方佛果門如華嚴經有一類菩薩經百千億那由他劫行六波羅蜜不生佛家猶名假名菩薩以雖見佛性未彰智業猶名假名菩薩也五楞伽經以五法三自性八識二無我為宗彼經於南海中楞伽山說其山高峻下瞻大海傍無門戶得神通者堪能升往乃表心地法門無修無證者方能升也下瞻大海表心海本自清淨因境風所轉識浪波動欲明達境自空心海自寂心境俱寂事無不照直為根熟菩薩頓說種子業識為如來藏異彼二乘滅識趣寂者故亦為異彼般若修空菩薩樂空增勝者故直明識體本性全真便成智用故了真即識成智異彼深密經意別立九識接引初根漸令留惑長大菩提故不令其心植種於空亦不令其心如彼敗種也解深密經乃是入惑之初門楞伽維摩直示惑之本實楞伽即明八識為如來藏淨名即觀身實相觀佛亦然淨名與楞伽略同深密經文與此二部少別如華嚴經不爾佛身及境界法門行相懸自不同說彼楞伽經即是化身所說境界即是穢土山峰所居法門說識境界為真問答即以大慧菩薩為首化身明教是權大慧且論簡擇如華嚴經教佛身即是本真法報境界即是華藏所居法門即是佛果法界為門問答即是文殊普賢理事智之妙用五位行相因果互融十剎十身體徹相入六維摩經不思議為宗維摩經與華嚴十種別一淨土莊嚴別如維摩經中所說淨土如來以足指按地即三千大千世界若千百千珍寶嚴飾譬如寶莊嚴佛無量功德寶莊嚴土一切大衆歎未曾有而皆自見坐寶蓮華而未說無盡佛剎莊嚴等事在一毫塵中如華嚴經中具說十佛毗盧遮那境界十蓮華藏世界海有無盡世界海重重相入一塵之內有無盡世界海圓滿十方佛境界衆生境界互相涉入不相障礙衆寶莊嚴如光如影廣如經說不但獨言三千大千世界之所嚴淨二佛身諸相報化別說此維摩經是三十二大人之相化佛所說說華嚴經佛是九十七大人之相及十華藏世界海微塵數大人之相實報如來所說三不思議德神通別維摩經說菩薩神通以小室之內能容三萬二千師子之座各各高八萬四千由旬八千菩薩五百聲聞百千天人維摩詰置其右手掌擎其大衆往詣菴園又以手斷取東方妙喜佛國來至此土示於大衆送還本處如是神變且為權教聲聞菩薩等見道未實自他未亡所現神變依根所見皆有往來分劑限量又是一時之間聖意以神力變化起諸小根令漸增進故非是法爾力故如華嚴經中以自本覺自覺本心身心性相與佛無異無有內外往來諸見是故毗盧遮那佛不移本處而身遍坐一切道場十方來衆不移本處而隨化往都無來去亦無神力所致是故經中每言以佛神力及法如是力者以佛神力推佛為尊法如是故惟其本德都無變化即一一衆生身諸毛孔之內周遍十方不同權教以其神力分劑往來擎來送去致斯妄見違本法身障真菩提本覺性智是故淨名菩薩現斯神變已方陳實教維摩經云觀身實相觀佛亦然我觀如來前際不來後際不去今則不住是故權教小見樂欲希奇菩薩稱根粗施接引令生樂學方授實門不可以執化成真恆迷智眼有作之法難成隨緣無作易辦作者勞而無功不作隨緣自就無功之功功不虗棄有功之功功皆無常多劫積修終歸敗壞不如一念緣起無生超彼三乘權學等見四所設法門對根別維摩經對二乘根令回向菩提入大乘又對大乘中滯淨菩薩悲智未滿者令其進修即如衆香世界諸來菩薩衆欲還本土請佛世尊願賜少法如來依根見彼菩薩滯於淨土悲智心劣便為說法令學有盡無盡解脫門云不離大慈不捨大悲深發一切智心而不忽忘教化衆生終不厭倦於四攝法常念順行在諸禪定如地獄想於生死中如園觀想見來求者如善師想令且漸修增長悲智未即一下頓示佛門未即說言十住初心便成正覺未即示其廣大妙事皆有分劑故五諸有來衆聞法別維摩經中所有來衆除文殊慈氏等大菩薩衆舍利弗等影響聲聞餘外來衆總是三乘之中權學之衆漸令增進未說圓滿諸佛本乘華嚴經中所有來衆皆是乘如來乘佛智果德自體法身具普賢行而隨影現十方剎海一切道場還成如來所乘本法無有一箇三乘根機設有三乘根機如盲如聾不知不覺猶如盲人對於日月猶如聾人聽天樂音如業貧人對天寶藏如大福德處於地獄亦如餓鬼臨大海邊與佛同德同身終不能信不覺不知別求佛見故經云佛子設有菩薩於無量百千億那由他劫行六波羅蜜修習種種菩提分法若未聞此如來不思議功德法門我時聞已不信不解不順不入不得名為真實菩薩以不能生如來家故如維摩經中娑婆之衆彼此未亡香積諸徒垢淨全在當知此類守一方之淨剎雖名菩薩諦道未圓如是之徒未詳佛意與法身智身懸隔惟華嚴之衆自身與佛身無別自智與佛智無差性相含容一多同別居法界海之智水示作魚龍住涅槃之大宅現陰陽而化物主伴自在交映相參師弟互融因果通徹六設教安立法門別維摩經以淨名居士現少許不思議之通變令二乘回心又處於生死現身有疾令知染淨無二又表菩薩大悲有疾菩薩具陳不二建定慧觀智用彰不求之法未似華嚴經具陳十住十回向十地等覺五位大位行相因果同別法門七淨名菩薩示行別淨名為表大悲示入生死現其病行華嚴經毗盧遮那以大悲示入生死成正覺行八所闡法門處所別說維摩經在毗耶離城菴羅園及在淨名之室說華嚴經在摩竭國菩提場中及一切世界一切塵中說九常隨佛衆別說維摩經時聲聞為常隨佛衆但具五百說華嚴經時總是一乘大菩薩衆為常隨佛衆具十佛剎微塵大衆總是具普賢文殊體用等衆十所付法藏流通別維摩經囑纍品中說佛告彌勒菩薩言彌勒我今以是無量億阿僧祇劫所集阿耨多羅三藐三菩提法付囑於汝即以其經付囑已成菩薩已生佛家者華嚴經如來出現品中付囑流通即以其經法付囑凡夫初心始能見道生在佛家者何以然此經表三乘是權所有得法未成實故所有說法者亦未實故華嚴經云此經珍寶不入一切餘衆生手唯除如來法王真子生如來家種如來種諸善根者佛子若無此等佛之真子如是法門不久散滅問曰若計佛之真子即十方世界無盡無邊世界微塵莫知其數何慮此經即便散滅答曰此經付囑凡夫令覺悟入此法門令生佛家使其轉教佛種不斷若囑纍諸大菩薩凡夫無緣無凡夫修學者凡夫道中佛種即斷故付囑凡夫令修不付已前大菩薩舊見道者七法華經會權入實為宗此經引彼三根之人歸一乘實教故引衆流而歸海攝三末而還源藏法師等會為共教一乘為三乘同聞故華嚴經為別教一乘為不與三乘同聞故參詳此理會此二門法華經引權器以歸真華嚴者頓示大根而直受雖一乘名合法事略同論其軌範有多差別略舉十門用知綱目一教主別說此法華經即是化身佛說還過去滅度多寶佛來證成此經三世諸佛同共宣說如華嚴經即不然教主即是毗盧遮那即是法報理智真身具無量相海功德之身之所莊嚴三世諸佛同為一際一時一法界報相重重無有障礙古今一際非三世故舊佛非過去今佛非新出為根本智性相齊理事不異如是本佛說本法頓受大根不是化佛故不似法華經有舊佛滅度多寶如來今佛出世說法華經故二放光明別說法華經雖放眉間毫相果光所照境界但言萬八千土皆如金色仍有限量不稱無邊無量無盡故但彰果法不彰因位華嚴一部經典教行因果表法光明始終具十三國土別說法華經時三變世界令成淨土移諸天人置於他土然後安置他方來衆變此穢境令成淨剎說華嚴經時即此娑婆世界即是蓮華藏世界一一世界互相含入經云一一世界滿十方十方入一亦無餘世界不增亦不減無比功德故如是又云諸佛成道在一小衆生身中化無量衆其彼小衆生不知不覺只為凡聖同體無移轉相纖毫之內自他同體不同法華之會移轉人天方明淨剎四請法主別說法華經時請法主者即是舍利弗以為勸請之首說華嚴經時佛令文殊普賢隨位菩薩各自說自位法門為說法首佛表果法舉果為因起大悲行成根本智果體自成故無言不說也以大悲行從無作根本智起故阿僧祇品世間數法廣大難量唯佛究竟不屬五位中因果門是佛自位內法門還佛自說隨好光明功德品即是如來自成因果後自說佛法亦不屬五位之內行相因果此名佛果無二愚也除此二品經外諸餘三十八品皆是五位之內行相法門是故佛不自說總令十信十住十行等當位之內菩薩自說佛但放光表之當說華嚴經時無聲聞及小菩薩為請法主皆佛果位內諸大菩薩自相問答安立佛果法門行相為悟大根者故頓將佛果直受為因因即以果為因果即以因為果如種種子等以定慧力思之可見五大會莊嚴真化別如法華會令三千大千世界清淨莊嚴其諸化衆亦皆充滿所來諸佛皆云是化華嚴經即不爾即有十處十會衆皆滿十方不移本處而充法界一一身相及身毛孔國剎重重菩薩佛身互相徹入雜類衆生亦皆無礙身土相徹如影含容所來之衆不壞法身而隨相好法身相好一際無差即相全真無有化也不同餘教說化說真有相參會六序分之中列衆別法華會中先列聲聞衆萬二千人俱次列摩訶波闍波提與眷屬六千人俱此為姨母六千人俱次列耶輸陀羅比丘尼此是佛為太子時夫人佛為太子時有三夫人一名瞿夷二名耶輸三名摩奴舍瞿夷次列菩薩八萬人俱次列諸天龍鬼等華嚴經即不然先列菩薩上首有十佛世界微塵數不論其從者次列執金剛神衆已後諸神龍天等衆部類總有五十五衆一一部從各有佛世界微塵數衆一身即以法界為量自他之境都亡法界即自身遍周能所之情見絶七龍女轉身成佛別法華經龍女於剎那之際即轉女身具菩薩行南方成佛華嚴經即不然但使自無情見大智逾明即萬法體真無轉變相維摩經中舍利弗謂天女曰何故不轉女身天女謂舍利弗我十二年來求女人相了不可得當何所轉如菴提遮女謂舍利弗自男生我女當知萬法本自體如有何可轉華嚴經入法界品中善財童子善知識文殊普賢比丘比丘尼長者童子優婆夷童女仙人外道五十三人各各自具菩薩行自具佛法隨諸衆生見身不同不云有轉若以法眼觀無俗不真若以世間肉眼觀無真不俗以法華經對權教三根見末盡者令成信種且將女相速轉成佛令生奇特方始發心趣真知見明且引三權令歸一實又破彼時劫定執三僧祇令於剎那證三世性裂三乘之見網撒菩薩之草菴令歸法界之門入佛真實之宅故令龍女成佛明非過去久修年始八歲又表今非舊學轉女時分不逾剎那具行佛果無虧毫念法本如是自體無時權學三根自將見隔自迷實法返稱為化不知己躬本事如斯全處宅中猶懷滯見云何界外懸指僧祇此見不離定乖永劫回心見謝方始舊居何如今時滅諸見業徒煩多劫苦困方回如華嚴經法界緣起門明凡聖一真猶存見隔見在即凡情亡即佛無有一法可轉變相是故不同龍女轉身成佛八龍女成佛所居國土別即言南方無垢世界非此娑婆解云心得應真故稱無垢正順本覺故號南方南為離離中虗八卦中離法心心虗無故則明若有別住南方自他彼此猶隔此乃猶順三乘分引權根而生信解還就佛乘故為三乘餘執勢分難摧且有一分回心自他之情未絶不同華嚴自他相徹一一微塵之內住因陀羅網之門也九六千之衆發心別法華經云龍女成佛時娑婆世界菩薩聲聞舉衆皆遙見龍女成佛普為時會人天說法心大歡喜悉遙敬禮此但順三乘權學有為菩提未得普門法界未覺菩提自他同體以此義故故有遙敬禮華嚴經即不然即以普門法界普見法門如來藏身三昧之境因陀羅網莊嚴法門世界海漩重重妙智一時同得為一證一切證一斷一切斷故即自身之內有十身諸佛剎海莊嚴佛身之內即自身之境重重隱現十方世界法爾如斯猶如衆流歸於大海雖未入海潤性無差若入大海皆同鹹味一切衆生亦復如是迷之與悟雖然有殊本來佛海元本不異云何法華經中娑婆之衆有遙敬禮以此事儀法則與華嚴全別只如法界品內六千之衆剎那十眼逾明五百小童一生十身咸證理事齊亘無法不彰法界既處塵中何得有遙敬禮十授聲聞遠記別法華之中龍女頓印法界無時之門全彰佛果三乘權學雖有信順之心餘風未殄未能頓證遠劫方登故受遠記不同華嚴迷即處凡悟即是佛設有餘習以佛知見而用治之無佛知見但成折伏不得入佛駛水之流還經遠劫方能入也為三乘之初心信根下劣故不能離縛籠繫煩多樂著生死雖求出世根器下劣滯住退還如來於是以生老病死無常不淨剎那滅壞念念不住如是等觀使令觀之令生厭離捨厭心成心居淨穢如來於化教之中復勤修悲智以求佛果仍推淨土在於餘方為彼三乘見分未亡見此娑婆恆常是穢說因說果破彼疑心暫化令淨却攝神力還當見穢因斯無常觀智習性難回龍女雖頓示佛乘雖信未能即證以是義故法華會內所受記別皆蒙遠劫法華漸引來歸華嚴當時直授發心即佛故以此義故行相不同此一部經同門有二一乘如來乘直至道場如來乘者即一乘也如華嚴賢首品云一切世間羣生類鮮有欲求聲聞乘求緣覺者轉復少求大乘者甚希有求大乘者猶為易能信此法甚為難又經云若有諸衆生其心饜沒者為說聲聞道令離於衆苦若復有衆生其心少明利為說因緣法令得辟支佛若復有衆生樂學慈悲心廣饒益衆生為說菩薩道若復有衆生決定樂大事轉無盡佛法為說一乘道此乃華嚴經中分四乘義也如法華經中門前三駕且示權門露地白牛方明正教佛乘唯有一無二亦無三二三門外之權宗方明露地之實教四乘契會二教共同施設化儀各有差殊又法華云唯此一事實餘二則非真准此一文似立三乘論其契會還成四法唯此一事實者即佛乘事實餘二者即菩薩大乘通緣覺聲聞是餘二為緣覺聲聞厭苦相似故又龍女一剎那之際印三世性從凡夫即聖不移毫分此乃與善財童子解行入道法門略同善財一生成佛者不離剎那際證三世性古今總齊還與龍女一剎那際轉身具行成佛一時總畢皆稱本法法如是故立時劫者衆生情塵也善財證此名為一生為三世時劫既盡更有何生故名為一生八大集經以守護正法為宗九涅槃經佛性為宗與華嚴經有十種別一說法處所別涅槃經在拘尸那國阿利羅跋提河邊娑羅雙樹間說華嚴經在摩竭提國菩提場中寶菩提樹下說二境界莊嚴化報別說此大涅槃經時諸佛世界諸大菩薩悉來集會又文云爾時三千大千世界以佛神力故地皆柔軟無有丘墟沙土礫石荊棘毒草衆寶莊嚴猶如西方無量壽佛極樂世界說華嚴經時有十蓮華藏世界海廣說如此莊嚴即是如來自身實報之所莊嚴非如此涅槃經中以佛神力為衆生故暫化令淨所以然者為此涅槃經來衆三乘根衆雜故若不以佛神力持無由自見如華嚴中一乘根純無有雜衆如聲聞為根別故在其會內元來不見經中雖然還有以佛神力下文還有法如是力所言神者應真曰神非同實是凡夫加令暫見名之曰神當知華藏莊嚴本明實報涅槃神力暫爾權施三大會來衆別說此大涅槃經所有來衆總是人天種性三乘之衆除諸大菩薩衆餘者皆是憶念如來涕淚盈目荷奉香薪嗟苦悲哀戀承佛日華嚴經所來之衆皆性智海中佛果位內諸菩薩衆純是一乘更無別種人天神衆皆悉同根入佛智流具佛知見初會之中十佛世界微塵等諸菩薩衆皆從如來善根海生善根海者是即如來法身智海大智所生一切諸佛以法身根本智為根本所生若不如是所有行門總屬有為如此之衆從初發心入佛智海寄治十信十住十行十回向十地等覺六位當知涅槃會三乘菩薩聲聞人天等衆不同華嚴此是一乘位中菩薩衆初發心位皆同佛位入佛智流同佛知見為真佛子也四所建法輪主伴別涅槃經勸請之首即是迦葉菩薩文殊師利菩薩師子吼菩薩舍利弗等為法軌度勸請之首魔王波旬勸請如來入般涅槃如華嚴經建法之首即是普賢文殊覺首法慧功德林金剛幢金剛藏等如是十首十慧十林十幢十藏佛果位內大菩薩等建立五位佛果之行相法門以諸位即佛佛即諸位明位位中有佛果故是故不同涅槃經中迦葉菩薩聲聞舍利弗生在人家示同凡位引彼三乘之種見佛涅槃而生悲感涕流盈目而來集會五所來之衆聞法別此涅槃經為諸聲聞二乘權教菩薩行諸觀行未離執障樂著諸行執持行相於此行相迷無作法身無證無修本來自體也如來為此根故於此涅槃經說諸行無常是生滅法生滅滅已寂滅為樂所行善行及能證菩提是生法故所證涅槃是滅法故既心存能所生滅不休以生滅不休便滯真理故說諸行無常如來隱身不現及諸能所心盡名大涅槃是故涅槃經中純陀向文殊師利菩薩言莫謂如來同於諸行復次文殊師利為知而說不知而說而言如來同於諸行若言如來同於諸行則不得言於三界中為人天中自在法王是故大般涅槃令彼三乘令知諸行菩提能證所證涅槃悉是無常生者本無不證諸滅無行無修名大涅槃是名圓寂如華嚴經所有他方來衆此土人天霑其會位從始發心即達理事自在理行無礙文殊理普賢行一時頓印如印印泥無有先後中間等若存始終因果先後皆是凡情皆是生滅有成有壞皆是隨根破繫不關成佛正宗此華嚴經直為最上大心者說如將寶位直授凡庸如夜夢千秋覺已隨滅如涅槃經所說雪山有草名曰肥膩牛若食者純得醍醐無有青黃赤白黑色最上大心衆生亦復如是頓見佛性便成正覺不從小位漸漸而來是故今言來衆聞法別以涅槃經攝末從體未論智慈真俗並用無礙六報土淨穢所居別涅槃經佛報土指在西方過三十二恆河沙佛土有釋迦報土為三乘權學垢淨未亡見此娑婆穢惡不淨如來於是權指報土在於西方華嚴實教法門即此娑婆世界清淨無垢為實教菩薩垢淨盡故境界純淨權教菩薩無垢淨處自見穢故故指報土在於西方七佛身權實別如涅槃經中三十二相如來是權涅槃圓寂真理是實為一切報相無量莊嚴皆依真而有故如華嚴經毗盧遮那佛三十二相入涅槃佛俱實理事無二不壞法身而隨相海無量無盡即相即性即報即理如光如影自在無礙八出生滅度現相別涅槃經為諸人天聲聞緣覺二乘之人施設從兜率天降神受生及入涅槃八相成道亦為諸大乘菩薩說不從兜率天降神母胎說常樂我淨無始無終不生不滅然且隱身不現仍推報土在於西方以此娑婆為化土穢境華嚴經即不然直示本身本法出超情見無始無終三世相絶一圓真報不生不滅不常不斷性相無礙自在果海法門直授上上根人不同權學依次第漸漸而成只如登峰九仞不可以絶其踪履十層之級者不可以亡其跡常見官階一品但以為臣忽有身登九五明珠頓照普見無方澤淋大海渧渧皆滿一塵空性法界無差品類有情強生留繫根器不等權實不同以此教門千差萬別須知權實識假修真不可久滯權宗迷其實教者也九示教行相別涅槃經十住菩薩位階十地尚不了了知見佛性即從凡夫十信心後十住之位少分而見漸漸而修等覺位中方明果行圓滿妙覺之位方是如來當知此經還有五乘六乘七八九十乘等法門種性除聲聞乘緣覺乘外有三種菩薩乘通彼二乘為五乘并取人天五戒十善即為六乘七乘又三乘之人同聞各得自法互參有九乘其三種菩薩乘云何一修無我法門乘二從十住至十地漸見佛性乘三如雪山肥膩草牛若食者純得醍醐乘不從乳酪生熟酥等漸漸方成如如來性品中說菩薩摩訶薩既見性已咸作是言甚奇世尊我等流轉無量生死常為無我之所惑亂即是法華華嚴經中說有諸菩薩經無量劫修六波羅蜜得六神通讀誦通利八萬四千法藏猶故不信此甚深經典是其例也所得神通不依性起為修衆善及無我等觀報勝諸天又如北單越人先世亦修無我所觀報生彼國壽千年衣食自然粳米七寸火珠熟之香所及處皆來共食無有佛法不得解脫皆是過去行解訛謬故致斯咎令其所得永不得亡如此涅槃經中十地後佛果法門乃是華嚴經中十住初心之所見處即雪山之草名為肥膩牛若食者純得醍醐無有青黃赤白黑色如華嚴經中十住菩薩初心見道頓見自他無始無終無古無今本來是佛身心性相本是佛故以此佛門以為解脫乘如來乘直至道場龍女善財一萬諸龍八千之衆總是六千比丘五百優婆塞五百優婆夷五百童子五百童女都為八千頓彰五位總齊佛果理智之門初住即十地初住即佛位若初住不即佛位者如世卿臣從初九品至階一品但得為臣不得名王若不名王者當知權教安立五位諸地次第一一而登至三祇之滿劫但為菩薩不名佛乘不名為乘如來乘直至道場但為修無我觀悲勝二乘不見佛性名為菩薩若少見性者亦得佛乘如大海中一毫之渧乃至多渧一一渧中皆得大海如是菩薩五位之中十住十地一一位內皆有佛果從初發心十住之始頓見如是如來法身佛性無作智果遍行普賢一切萬行隨緣不滯悉皆無作涅槃經云佛性非是作法但為客塵煩惱所覆故是故今從十住初位以無作三昧自體應真煩惱客塵全無體性唯真體用無貪嗔癡任運即佛故一念相應一念成佛一日相應一日成佛何須劫數漸漸而修多劫積修三祇至果心緣劫量見障何休諸佛法門本非時攝計時立劫非是佛乘十從初為友軌範別涅槃經中說雪山童子遇羅剎而發心重半偈而輕命聞諸行無常是生滅法言佛性涅槃不可以行修不可以心證不可以行修行是有為是無常故不可以心證有能所故是故行不可以修其性心不可以證其理為心即性更無能所是故純陀言莫謂如來同於諸行如華嚴經善財童子所立軌範從文殊師利發菩提心至末後普賢菩薩五十三善知識一一皆云我先發阿耨多羅三藐三菩提心云何教我學菩薩道行菩薩行不云諸行無常等事何以故為此華嚴經明緣起法界門理事無二無緣不寂無事不真國土境界總為性海為一真法界非有情無情隨業說故為華嚴中純真境界總為智故十住菩薩以慧為國十行菩薩以智為國十回向十地以妙為國不說情與無情二見差別以華嚴經為彰本法異三乘權學是無情是有情有生有滅故是故涅槃經中以雪山童子說諸行無常者為三乘根種性行下劣便於所說計行成實障無作性廢契真理以是義故說諸行無常不同善財一念發心頓無能所了三世性性絶古今自覺自心本來是佛不成正覺不證菩提身心性相無證修者不成不壞本來如是隨緣動寂不壞有無所行諸行皆唯智起是故不說諸行無常十大方廣佛華嚴經此經有十種甚深廣大無比法與諸經別若有大心衆生於此法門深生信心不讀餘經初發心時十住之首位齊佛果如來出現品中所說云設有菩薩於無量百千那由他劫行六波羅蜜修習種種菩提分法若未聞此如來不思議大威德法門或時聞已不信不解不順不入名為假名菩薩以不能生如來家故若得聞此如來無量不可思議無障無礙智慧法門聞已信解隨順悟入當知此人生如來家隨順一切如來境界猶如大海大身衆生之所都止此經亦爾最上大心衆生之所都止澤沼之龍不樂其居猶如大海不宿死尸若有見聞信樂而能悟入永離凡夫權學闡提死尸直同如來法身智海又如來出現品云佛子如來音聲亦復如是無生無作無有分別非入非出但從如來功德法力出於五種廣大音聲其五者何一曰汝等當知一切衆生諸行皆悉是苦地獄苦畜生苦餓鬼苦無福德著我所苦作諸惡行苦欲生人天當修善根生人天中離諸難處衆生聞已捨離顛倒修諸善行離諸難處生人天中二曰汝等當知一切諸行衆苦熾然如熱鐵丸諸行無常是生滅法涅槃是寂靜無為安樂遠離熾然消諸熱惱衆生聞已勤修善法於聲聞乘得隨順音聲忍此是聲聞乘三曰汝等當知聲聞乘者隨他語解智慧狹劣更有上乘名獨覺乘悟不由他汝等應學樂勝道者聞此音已捨聲聞道修獨覺乘四曰汝等當知過二乘位更有勝道名為大乘菩薩所行順六波羅蜜不斷菩薩行不捨菩提心處無量生死而不疲厭過於二乘名為大乘此是菩薩大乘五曰第一乘勝乘最勝乘上乘無上乘利益一切衆生乘若有衆生信解廣大諸根猛利宿種善根為諸如來神力所加有勝樂欲求佛果者聞此音已發菩提心此是佛乘佛子如來音聲不從身出不從心出而能利益無量衆生佛子是為如來音聲第一相當知如來音聲常隨五乘衆生應所聞故猶如大海潮無失時故是故於此法中起信發大菩提心十住初首便即見性起法身佛智慧便成正覺然始即從性起智慧之位行諸行相教化衆生即覺行圓滿佛不同權教先行菩薩行學假真如等觀地前伏忍十地已來猶有十真如障故為觀當情真如成障所行之行並是有為所發菩提心並未離生滅所有能斷分別無明由觀折伏十地之位方能見性經三祇劫方始成佛仍須百劫別修相好若將此大方廣佛華嚴經佛所本乘同彼化身引彼權學上中下流全非信解去佛懸遠未解經意久大曠劫終無成佛之期若上上根人信解此經明知不謬即當乘如來乘直至道場當所乘時即是道場更無可至如法華經亦是佛乘即是化佛引彼三乘令知實法即三界火宅門前三乘羊車鹿車大牛之事即是上中下根三乘為上根之人有一分慈悲勝餘二乘故為觀假故未有實見名為不真菩薩此三種上中下根之人俱有惡三界苦中下根人聲聞緣覺惡而求出上根菩薩厭而不離為慈悲勝彼二乘故有饒益之心此三種人俱不知三界體相一真佛境如出現品中廣明佛對此故說佛所有功德報相皆是修生令諸權學修治作意經多祇劫終無成佛之期是故門前之駕是佛權施露地白牛方明法界法界性相本唯真智所有分別皆是智為是故法華經云種種性相義我及十方佛乃能知是事聲聞及緣覺不退諸菩薩皆悉不能知此等即是門前三乘也為未明世間相常住是法住法位為三乘同有厭苦集樂修滅道之心未明苦集本唯智起不了滅道本自無修無造無作化諸羣品如幻住世性絶無明即是佛故一念相應一念佛一日相應一日佛何須苦死要三僧祇但自了三界業能空業處任運接生即是佛也蓋佛者覺也覺業性真業無生滅無得無證不出不沒性無變化本來如是即是佛故隨緣六道行菩薩行變化神通接引迷流佛非變化淨名經云雖成正覺轉於法輪不捨菩薩之道是菩薩行故以此善財十住初心於妙峯山上德雲比丘所得憶念一切諸佛境界智慧光明普見法門即便成正覺然後始詣諸友求菩薩道行菩薩行當知正覺體用之時即心無作處即是佛故不須修行設當行滿亦不移今故如化佛示成化相之時苦行麻麥剃髮持衣捨諸飾好藉草等事為化外道樂苦行者及三乘之根有放逸者經中佛已和會非佛自須如是等行無增上慢者豈須如是一念任無作性佛智慧現前無得無證即是佛也如善財證覺之後方求菩薩道行菩薩行何以然者為覺道之後方堪入纏處纏無縛始能為衆生說法解縛若自有縛能解彼縛無有是處說時前後法是一時是故當知若欲行菩薩行先成正覺問曰法華經為佛乘門前三乘大牛車興露地白牛之車一種是牛有何異也答曰門前三乘對三界苦且令離火宅所燒權免火難大乘權教菩薩樂行悲心有饒益志自離火難不離三界有一分度衆生心勝二乘自求解脫且得一分運載之心故名為大牛望二乘處大故十地見性方成佛猶經多劫始能真故望彼二乘但名菩薩大乘非名佛乘法華經云佛乘唯有一無二亦無三即引彼三乘總歸一乘小乘雖有信許成佛回習稍難故標遠劫龍女剎那之頃便至佛乘即明真證達苦即真無所厭故是故門前之乘對三乘設露地白牛方明至無依之處露地者即佛地也為佛智無依止故故云露地白牛者即法身也悲智也以法身無相名之為白智能觀機悲心濟物名之為牛為取牛能運載故為以無作法身悲智濟物故喻同牛也門前之牛觀空增勝三祇未滿未見佛性不證法身根本智不言白色不言露地為假真如及空觀當情猶有所依故不言白色有所依故不言露地也雖復回心信此一乘至於佛地猶將未及但隨佛語而隨信之心未成堅信故還索三乘未敢欣大故佛便誘引令成信力等與大車故言非己所望今皆與之此明即三乘回心如門前牛車不云白色不云裝飾為有漏故不同露地白牛之乘具言高廣裝飾等事此乃門前與露地之乘全別不同也第二明依宗教別夫大覺出興稱真智而自在法身無際等羣品以同軀任器現形應根施教如空谷響應擊成音谷響無心亦無處所如來設教亦復如是且如毗盧遮那之教無始無終稱性無方無斷無絶隨其根類自見入胎出家說法始終教行入寂涅槃其實如來本不如是但隨一期同而且異約立先德十家教行第一後魏菩提留支立一音教第二陳朝真諦三藏立二教同時第三後魏光統律師立三種教第四齊朝大衍法師立四種教第五護身法師立五種教第六陳朝南嶽思禪師智者等立四教同時第七唐朝海東新羅國元曉法師造此經疏亦立四教第八唐朝吉藏法師立三種教第九梁朝光宅寺雲法師立四教第十唐朝江南印法師立二教已上十家所釋並依今唐朝吉藏法師所集同異各是一家並是當世英才智超羣品皆為統賢靈之法將開佛日之明燈不可是非加其名也只如佛說內外中間之言遂即入定後有五百阿羅漢各解此言佛出定後同問世尊誰當佛意佛言並非我意諸人問佛既不當佛意將無得罪佛言雖非我意各順正理堪為聖教有福無罪況此諸德所說各有典據仰惟高旨未可僉量但通玄自參聖教隨己管窺以述意懷用呈後哲准其教旨略立十種何者為十第一時說小乘純有教第二時說般若破有明空教第三時說解深密經和會空有明不空不有教第四時說楞伽經明契假即真教第五時說維摩經明即俗恆真教第六時說法華經明引權歸實教第七時說涅槃經令諸三乘捨權向實教第八時說華嚴經於剎那之際通攝十世圓融無始終前後通該教第九共不共教第十不共共教第一時說小乘純有教者為諸凡夫繫著世法以為實有隨於色塵作諸不善以不善故墮於苦趣還將有法轡勒彼心以戒防護制諸不善故名純有教於小乘中還說無表性戒等通其大體但隨根性用事不同如菩薩戒亦爾經云若人受佛戒即入諸佛位亦以性戒論之又云如是千百億各接微塵衆俱來至我所者所謂初以化身化報引接後以令歸法身實報若上根者法身事理一時為依本故第二時說般若破有明空教者既設小乘實有令成軌範制共身語意得住善法即說生空等觀方說法空教破彼繫著漸向法身第三時說解深密經為和會空有教者為於前空有二教和會令邊見者不滯空有二門為不空不有教為二乘人滅識證寂住寂無知為回彼故寄說第九阿陀那識為純淨識五六七八等識常依彼九識以為依止凡愚不了妄執為我如水瀑流不離水體諸波浪等以水為依五六七八識常以淨識為依故漸回二乘之心達識成智何故安立九識為淨識者為二乘人久於生死業種六七八識有怖畏故恐彼難信方便於生死種外別立淨識漸漸引之意欲使令留惑不滅使令悲智漸漸得生深密經云如是菩薩雖由法位以智為依止漸令空見達識成智第四時說楞伽經云說假即真教者如楞伽經直為大乘根頓說第八業種之識名為如來藏識又云得相者曰識不得相曰智起信論亦同此說此教雖說無明業種成智猶希出俗未現同纏也第五時說維摩經明即俗恆真教者為維摩經中不以聲聞二乘及三乘菩薩為知法者故是以十大弟子杜口於毗耶彌勒光嚴息芳言於法席此經破前四種教中菩薩聲聞染淨未融常欣出俗即以淨名身居俗士明即俗常真壞彼淨相常懷染淨故說有身為如來種無明有愛為種等使令三乘之衆淨相心亡出俗入纏平等無礙方明實德也第六時說法華經引權歸實教者為羅漢隨空會寂緣覺會十二緣生法皆無體性以明六根識及名色心境三事自性無生如是二人皆心識滅三界業滅智慈不生又為析法明空以空破惑樂生淨土及留惑潤生菩薩並不了一切衆生無明諸惑皆從一切如來根本性清淨普光明無中邊智之所生皆有淨土穢土自佛他佛欣厭等諸邪見不稱真理引此三根令歸本智故即以妙法蓮華令知無明生死性本唯智體性自無染但迷悟不同無有二性以蓮華像之引彼三根令歸本故是故法華經明世間相常住第七說涅槃經時令諸三乘捨權向實教者此經中明一切有情皆有佛性如佛無異但為無明覆故不見涅槃經是三乘中捨權就實相法華即是捨權就實智二部經俱是三乘中第六時教但為化相門中說時前後故分涅槃為第七時教然其智境無有次第古今時也第八說華嚴經時於剎那際通攝三世及十世圓融教者如經說云入剎那際三昧降神受生八相成道入涅槃總不移時為依本性理智本無時故非權依本也故名為入非是本法性中而有出入三昧以化儀軌則施方便言是故諸明人莫隨其言言佛世尊一人入剎那際三昧此經教門無始無終是佛實報果德性相圓周若求其頭尾長短始終路絶出此法外別生情量總是權門非究竟說如此法門佛不出世亦無涅槃諸性一性諸智一智諸相一相諸行一行三世一念一念三世乃至十世如是等法無始無終名為常轉法輪如圓珠無方如明鏡頓照如虗空無隔如響無依如影不礙如化人所生若人了得此法門者佛智自然智無師智之所現前為此法無出沒故還以自然無出沒智而自能得之非情計思量之所能得也一切權教法門總在其中一時而說為諸權教不出法界無三世故各依自見無量差殊第九共不共教者為說諸大乘經人天三乘同聞得益各別經云菩薩在一小衆生身中成等正覺轉法輪度無量衆生其此小衆生不知不覺此乃常與衆生共及以大小乘共在佛海中身之與心本無差別然見佛不見佛聞法不聞法解脫知見大小及苦樂各各不同是故名為共不共教又經云入剎那際三昧示現從兜率天降神母胎出現轉法輪入涅槃此乃於無時之中諸衆生等自得時分見初中後於一音法內自得天人小乘大乘佛乘自得道果各各不同見佛住劫壽命長短各自差別而實如來性無造作無生無滅然以無作法性無垢白淨之智自體清淨能稱彼念令無失時如是與佛共法共智共時共身共心共乘以知見解脫各各不共故言共不共教亦如五百聲聞共在華嚴會而如聾如盲是其事也第十不共共教者如華嚴經中十方雲集諸來菩薩及佛國土所從來方不同各別所共同聲說法總同聞法獲益能同能別又於會中天龍八部人非人等各各差殊同得毗盧遮那果德法門具同具別自在
