body:
  text: 唐滄州長者李通玄合論明溫陵長者李贄簡要明吳興後學董廣𥌓閲正世主妙嚴品此第一會在菩提道場舉古佛果法夫闡教弘經須分四義一長科經意二明經宗趣三明其教體四總陳會數一長科經意者略作十段長科一明如來始成正覺二明舉果勸修三明以果成信四明入真實證五明發行修行六明智悲相入七明蘊修成德八明利生自在九明諸賢寄位十明令凡實證一明始成正覺者即世主妙嚴品是二舉果勸修者即現相品已下至毗盧遮那品總五品經是及世主妙嚴品舉佛所成之果令使人修三明以果成信者即從佛名號品已下至賢首品六品經是亦通取前世主妙嚴品已來總是便以十箇智佛以為自心之果以不動智佛為首明自心智隨分別性無所動故四入真實證者從升須彌山頂品已下六品經是以十住為體住佛智慧家故五發行修行者從夜摩天宮已下四品經是以十行為體行佛行故六明智悲相入者從升兜率天宮品已下三品經是以十回向為體體圓真俗成大悲故七明蘊修成德者從他化自在天中十地一品是蘊修前三法令慣習成就故八利生自在者十定品已下乃至普賢行品等十二品經總是以十地中蘊德成功十一地利生行滿方名法行圓滿佛九諸賢寄位者即已上六位諸菩薩并佛出現世間品亦是皆從性海大智境界中方便出現其身寄位成十信十住十行十回向十地及等覺位十一地法門令凡夫信入十明令凡實證者以法界性中安立十信等六位進修方便行不離用不壞方便其智彌高其行彌下逐根行滿故名進修隨力堪能安立諸位已上十段長科經意竟如法界一品總通前後四十品經總法界故以此法界一品是一切諸佛及一切衆生之果也若於根本法界門中起延促見皆是自情妄見於佛正法之中不成信種當知是人設修行出三界果未有成佛之種即權教六通菩薩聲聞緣覺是也如法華經不退諸菩薩亦復不能知此明出生死之不退未成處生死中不退又亦但得以空觀折伏現行煩惱入初地見道位非是已達根本無明得根本智見不退如是三乘見道總是三種意生身菩薩皆非是法界根本大圓明智初發心住中能十方成佛等不退三種意生身者初二三地名三摩跋提樂意生身四五六地名覺法自性意生身七八九十地名種類俱生無行作意生身如是三種意生身菩薩並是法界大圓明智海大宅門外草室權施方便安立令諸子等且免火難如此經下文聲聞在會如聾若盲六通菩薩設聞此經不能生信設能於佛法生信但隨情生信迷自智境故無自契實智起真信修故若不回心畢竟不成佛設復教化衆生還能成得三乘及人天之種但住一方之淨剎無廣大法界量等虗空無邊智之大見二明經宗趣者其義有六一明經宗趣二此經何藏所攝三分其序分四定其正宗五明此經付囑何人六明此經流通所在一明經宗趣者此經名毗盧遮那大智法界本真自體寂用圓滿果德法報性相無礙佛自所乘為宗經云有樂求佛果者説最勝乘上乘無上乘不思議乘等是還令初發心者為志樂廣大故還得如是如來大智之果與自智合一無二此經宗趣甚深難信若有信者勝過承事十佛剎微塵數諸佛盡經於一劫所得功德不如信此經中如來大智境界佛果法界門而自有之如經下文云設有菩薩經無量百千那由他劫行六波羅蜜得六神通猶名假名菩薩設聞此經不信不入如法華經亦是為回三乘人令歸一乘破彼几案所依法令得如來無依住智本自在故華嚴經即是始成正覺時頓為上根者説法華經即是佛出世後四十年中為回三乘者説又佛乘三乘一時總説但隨根自應一音法門各有差別總別義生真體無時無可作前後故如法華經云十方佛土中唯有一乘法無二亦無三但以假名字引導於衆生又云唯此一事實餘二即非真餘二者但以十方諸佛共所乘門為實三乘為餘二但權施設未真者是餘二故以一實對諸權皆是餘二為法華經責聲聞緣覺不退菩薩三乘等皆未能信一乘法故為權教菩薩雖有一分求菩提之心猶有怖生死故得離染不退未得稱真染淨平等不退如修空觀菩薩樂空增勝及樂生淨土等諸菩薩皆能離生死出纏不退不入法界性海一真無欣厭門故望此佛乘樂生死者及厭生死者二俱是退設觀空增勝修假真如門行六波羅蜜得六神通是離生死不退非是生死涅槃一性中不退故以是義故華嚴及法華經説得六神通菩薩不聞不信此經典故如法華經云設有菩薩讀誦八萬四千法藏為人解説得六神通亦未為難暫讀此經是則為難唯此智境界違情所解故甚難信也三乘信解順情所欣何以故説佛果即在三僧祇之後説佛淨土在於他方此娑婆是穢土修菩提者厭垢欣真樂生淨國設有住世菩薩所言留惑潤生為濟衆生故非由法爾根本智自在力合如斯故如是菩薩皆是順情之法法易信故非如此經説入佛果不逾剎那但隔迷悟説無量劫總不移一時故説從凡夫地創見道時因果一時無前後際不見未成佛時不見成正覺時不見煩惱斷不見菩提證畢竟不移毫念修習五十位滿一切種智悉皆成就總別同異成壞一時自在皆非世情所見是故難信也其所信者當信自心無依住性妙慧解脫是自文殊於心無依住中無性妙理有自在分別無性可動名不動智佛理智無二妙用自在是故號曰妙德菩薩是故一切諸佛從此信生故號文殊為十方諸佛之母亦號文殊為童子菩薩為皆以信為初生故信心成就十住初心便成正覺取能行行處號曰普賢自契相應名為正覺自契相應名為住心為住佛所住是故此經宗趣為大心衆生設如斯法即令善財一生得佛解云一生者從凡夫地起信之後即任法界智生非業生也二明此經何藏所攝者此經明毗盧遮那法界藏所攝以遍照法界海一切諸法門盡含藏故是故下文法界品中慈氏所居樓閣名毗盧遮那莊嚴藏善財入已唯見無量諸佛法藏行門報相莊嚴無盡福相皆阿僧祇是故此經常以佛果為進修道迹是佛根本大智古迹修差別智故若異佛古迹而有進修無成佛義如三乘且免一分粗生死苦非是依佛智體古迹契修佛乘也是故此經是毗盧遮那藏所收非三乘菩薩藏所攝三明分經序分者分為二門一都該一部二當品自有序分一都該一部者即世主妙嚴品是二當品自有序分如經品品之中會會之內皆有爾時如是以總言之一切過現未來諸佛皆盡一時成佛并衆生生死亦不移剎那但衆生妄計有年歲長短如佛所説即生即死皆不移時是故經云一念普觀無量劫無去無來亦無住如是遍知三世事超諸方便成十力明從凡夫地一念發心忽然見道進修十住十行十回向十地十一地五位等法成佛轉法輪入涅槃總不移剎那為以法界門為開示悟入故名實教一乘法界之門法如是故以三昧名目明之此品都舉此一乘根本法界皆明時不移亦不移處以菩提場無中邊故所修衆行常等如剎那三世無增減故無去來故次入法界品都舉天上人間十方世界總不思議法界體寂用自在故故令衆生悟入是故此之一品如來但以不思議神力説不藉口言明世間總真總神無出沒故四定其正宗者有三種正宗一隨位正宗二隨品正宗三大體正宗若以隨位正宗十信十住十行十回向十地十一地各有正宗十信以佛根本不動智為正宗十住以證入法界智如來果德理體妙慧為正宗十行以佛根本智起普賢行為正宗十回向以理智圓融真俗起興大願成悲智為正宗十地蘊修悲智使令慣習功濟為正宗十一地普賢行等衆生情流充滿法界海任用利生為正宗此為隨位正宗二一部教門四十品之內當品自有正宗三一部教大體正宗以如來大智法界性絶古今體用圓滿一乘佛果為正宗常以此佛果正宗以為開示悟入進修使令慣習成就五此經法門付囑何人者此經法付囑大心凡夫經云此經法不入餘衆生手解云餘衆生者三乘及外道樂著人天及求出世樂者何以故三乘菩薩具六神通尚自未能聞經生信何況二乘人天外道經云唯除生如來家法王真子即大心凡夫能生信證入故生於佛家不言已生佛家諸大菩薩諸大菩薩常為衆生説法無大心凡夫信證不名付囑不名流通為無人信無人悟入故六明此經流通所在者如來出現品中示現法則表始終五位因果滿故即以眉間光灌文殊頂口中光灌普賢口令此二人體用因果互相問答以文殊為法界體普賢為法界用二人互為體用或文殊為因普賢為果或二人互為因果此一部經常以此二人表體用因果今古諸佛同依此迹以明因果進修之益口光是付囑義流通義眉間毫光是果義以放果光付囑文殊令文殊發問果法普賢説佛出現即是流通三明教體者依涉法師釋出經教體有六今通玄依此大方廣佛華嚴經約立十法以為教體一一切衆生根器佛一圓音一念三世無始無終常轉發輪以為教體二一切聖凡境界莊嚴果報以為教體此乃見境發心不待説故又一切法無非佛事故三一切法自性清淨以為教體以觀察力心契自相應不待説故四以行住坐臥四威儀為教體見敬發心不待語故五以佛菩薩出現涅槃為教體以此法事令諸衆生見敬及念戀發心故六以佛菩薩神通道力為教體現諸自在見者發心不待文句故七以無常苦空為教體觀者發心不待語故八以無言寂然為教體即淨名居士默答不待名句文及以語故九以名句文身語及衆生根為教體藉言方現故十以法界一切法本真為教體衆生法之能淨垢故大要言之一切衆生諸煩惱海一切衆生隨分善根人天樂果聲聞緣覺菩薩佛乘解脫涅槃名句文身語業等及一切善惡果報虗空法界言與無言一切法無非教體以自觀智或以聞法或自思惟內熏智現能離諸惡及得涅槃説與不説皆是教體若無煩惱即無教體四總陳衆會於中大意其義有三一總舉會數二陳會意三説佛出世所由一總舉會數其會有十二陳會意一初會在菩提場中明示現初成正覺為化衆生故第二會在普光明殿重言如是我聞顯起初會為初蘭若菩提場體不離此體得道此處報宅所居故猶如世人於淨處得道方始歸來示現此法本無來去遷其時分第三會升須彌山頂帝釋宮説十住之門明十住之位創始應真心與空合自得慧用自在如天故如上高山身與空合第四會在夜摩天宮者明夜摩天居在空際不與地連明其十行依空行行在行恆空無所依故第五會在兜率天宮者明此天處是樂知足故説十回向為表回向之位均融理事不貪涅槃不著大悲不著大願使令處世如蓮華同塵而不污又表此天於欲界處中下有忉利夜摩上有化樂他化此天處欲界之中還説十回向門不令如三乘樂修出世心增二乘趣寂菩薩留生及捨淨土等過表法如是不即要生彼天明回真入俗使悲智均平第六會在他化自在天為於此天説其十地為此天以他變化用成己樂以明十地大悲大智但化衆生以為自己涅槃之樂無自樂故問何故超化樂而於他化説十地之行答曰為明從十回向均融理智大悲大願成滿增勝不依次第而超化樂不同下位次第而修又明菩薩進修行相十地之位道力功行階降合然以無明住地未純熟故未明淨故其無明住地果極方終設至十一地二愚猶在是故此經阿僧祇品如來隨好功德品二品之法佛果已前十一地普賢行滿未能達盡最下入法界一品如來神力説表法界中一切法總神總真總不思議以此二愚佛果方息是故十地之位隨力所堪堪至此天故雖進修階降位位差殊然法界體一時一念一得一切得不可即作始終長短存情思想違理之見第七會在第三禪説此一會説百萬億偈明三禪之中初禪除憂二禪滅苦憂苦既無三禪唯是法悅樂故由法樂故喜動還存以喜動故色心還在此色心是樂禪悅樂無思之色非如欲界之色故心有無思樂禪之色出入之息猶存報得淨身身如皓雪衣如金色過身一倍行即遊空足不履踐初禪身長二里半二禪身五里三禪身十里衣與身倍明此天説十一地法門表等覺位中順其法身行其萬行教化衆生遍周法界常法樂故至第四禪寄同是佛位故稱真法性無出入息隨理普周任衆生見習氣迷法之愚一切總盡世及出世法無事不窮號之為種種光明遍照義也以智滿故表法如是此之一會超前十地過初禪二禪二天明此十一地智倍倍增故第八會在普光明殿説十定法門其定名入剎那際以剎那是極短促思慮不及之故終不論別有生滅明如來出世始終不離剎那際為此稱法界本性以為定體更無長短始終三世但以佛自體無作大悲為母以一切種智為佛以法無性無所依為時日歲月以一切衆生根器為明鏡佛於一切衆生法海任物自見各得自法皆令向善及得菩提非是如來有重來重去相故但明此普光明殿是如來自性一切智種智之都體也為依報所居此剎那際定是佛一切智種智之法性故意在總括一切法界衆海會等總體不令學者有往來自他故第九會在普光明殿者明從此處起信心發行修十住十行十回向十地十定十通十忍乃至如來出現品佛果位終皆悉不離普賢舊行明以法身定體圓通始終一際一處三法同一不移普光明殿報居之宅齊頭普印無有重會三會去已還來以法界門不可作世情思想解故如善財從覺城東大塔廟處妙德之所初生信心經過五十箇位門見慈氏如來令其却見文殊明今至果不離初信之門菩提理智便聞普賢名便見其身等普賢身經云更入無量三昧者為明證過佛果位內二種愚故二愚者一迷阿僧祇廣大數愚二佛位之內隨好功德廣大愚此之二法唯佛究竟以是義故此兩品經如來自説及法界品如來不思議神力説為明法界是一切諸佛共所究竟果故以將此品示悟衆生餘三十七品是當位菩薩説勝鬘經云無明住地佛地方除第十會説法界品明此一會普含諸會及十方剎海法界虗空界總之一會重重無盡無盡重重一切諸佛海會及一切衆生之海總以此法界一品總為一體若見如來始成正覺及正像末三時教者非正覺見非見佛出興此乃劣解衆生且如是見求正覺者不應如是問曰云何見佛出興答曰當見自身無身無心世及出世都無住處無心所法無法法心心法無依以無依住智説如斯法教化衆生皆令悟入是名見佛出興不令衆生取佛出興滅沒之相見初見末但見自身衆生身心無生滅體是出世間如是我聞一時佛如者諸法如故即是佛故言如是以法界大智之真我聞佛説法界大智之真經故言如是我聞即明師弟體一又一切法如也以法體如所説法者及法亦如以法界智是所聞之智智亦如故故言如是心境不二方聞佛所説經若心境有差不可聞佛所説亦復不能信順領受我聞者是法界智之真我還見法界智之真佛還聞法界智之真經總法界智之真人互為主伴還化法界之真衆生悟入法界智之真性故言如是我聞如來所坐之座以法界為座體以如來一切萬行報得為依果莊嚴如來是大智之身座上所有莊嚴皆是如來大智隨行任運報得如龍遊雲起虎嘯風生報感之應然非物能與為也成最正覺者為簡非外道聲聞緣覺於權教中木樹草座厭俗出纏令劣解衆生起三乘種且拔分段苦非究竟覺之正覺簡非如是覺故故言成最正覺略説大相有九十七種大人之相隨好無盡頂著華冠項著瓔珞手著環釧非同三乘厭俗出家勸諸菩薩生於他方佛國淨土簡非如是故言成最正覺號毗盧遮那爾時世尊處於此座成最正覺并十普賢衆此是現果成因生信分何以然者為如來是正覺之果普賢等衆是佛行果如來所居華藏淨土是佛報得依果一切衆生以自根性觀如來三種因果及行佛自行普賢門而生信心故若不如是從何生信第二執金剛神等九衆諸神以明十住因果何以然者海月光大明菩薩亦是普賢等衆既以佛果位內諸佛共行普賢法入俗利生所堪利者還得舊法不利舊行以是義故還以普賢位內海月光異名菩薩便為十住初心明從凡夫地修學十信心信諸佛正覺之果無異自心所行諸行即普賢行所轉法輪即與十方諸佛智契同不異故以普賢入俗果行名海月光通已下等共成十衆用成十住菩薩位門已下通九衆諸神至主藥神等明是入十住之果行為入十住應真稱之為神非世鬼神也自心達理不與妄合其智自神不為不思而智善通萬有故世主妙嚴品十住法門方便住中十波羅蜜以禪波羅蜜為體以道場是除蘊穢義明禪能治蘊義故如世間場也以禪波羅蜜為場體般若波羅蜜為人功普賢萬行為馱運法界普光明智殿為大都居以一切種種智為大藏世主妙嚴品十行法門主稼神已下至主晝神此十衆神明十行利生法門因果以主稼神為表行為資糧故如世間以禾稼為資糧長養有為之身佛法即以十波羅蜜行為資糧長養法身十信之中全信自心與十方諸佛性相大智無差別體十住初心以修方便三昧力見道從初發心住及已上諸住總為見道之位十行十回向十地總為加行總為資糧如三乘菩薩多生他方淨土及四禪向上別有菩薩淨土設在欲界即言以悲願力故留惑潤生非如此經法門乘如來法界乘從初發心住以如來大智法身性果普賢行果普周生死動寂均平理事普進故以所見道除惑處為作佛名以心開悟處而為世界總是以隨位入道處因果為佛及國土世界菩薩之名皆非外有總明自行所行也如十行位中十箇慧世界十箇佛號皆名之為眼以為其佛果功德林等十林菩薩以為其行行之因大要言之以當位十佛為本位之果當位十菩薩為當位修行之因如此初會中以如來為當五位之果普賢菩薩及諸神天等為五位修行之因又普賢菩薩及諸神天等以毗盧遮那根本智為起修行本因以自己修行之身為佛差別智果以佛性智果為因以現修之身即理智之性果故互為因果互為體用是故神天歎德中先歎佛德次歎自己與佛同智同德此為入法之樣令諸學者迷即凡悟即佛故智悲齊進如善財童子十行初位中歡喜行善知識所居之國名為三眼還同十行菩薩所居世界名為親慧世界幢慧世界寶慧世界等十慧世界也三眼者一摩訶般若二解脫三法身亦以智眼慧眼法眼為三眼故如世字如摩醯首羅天王面上三目故為一切佛法不離此大智大慧法身故此十慧世界義通此三眼以是善財十行之中初善知識國名三眼比丘名善見即同十行之位佛號常住眼佛無勝眼佛名為善見者具三眼也為十行之中以智眼知衆生根而同行故佛號為眼善知識名善見目髮紺青皮膚金色圓光一尋相好如佛者明十行中所行三眼行因果即佛也以是義故五位中五十種資糧五十種佛果互為主伴互為因果互為體用以如來理智性果常資普賢行使令無染普賢行常資如來性果使得圓滿悲智廢一邊一切不成所有行門即是人天因果設得出世即是聲聞二乘及出世淨土菩薩及留惑潤生等如此十行與佛果資糧猶如黃瓜果華同出華果相資以無功而為自在也世主妙嚴品十回向法門從阿修羅王至日天子於中有十衆用表十回向何以然者為阿修羅居大海中不沒其身表十回向圓融真俗常處生死大海不沒其身前之十住十行但修出世悲智心增加以回向回真入俗得真不證知真同俗處俗無染利生自在如阿修羅雖處大海而海水不沒雖同天趣無天妙樂故此位菩薩處於生死無生死中五欲樂雖處涅槃無涅槃中寂滅樂故名救護衆生離衆生相回向又如法界品云成就如來高出世間阿修羅王又王者自在義明此位菩薩於涅槃生死中得自在故又阿修羅亦云阿素羅阿之言無素云遊故又云妙又羅云戲如婆沙論釋為非天也雖天趣攝為多諂詐而無天妙樂像此位菩薩行大悲方便萬行似如諂詐似如生死無有人天五欲樂無常住涅槃出世寂滅之樂主十回向中檀波羅蜜門第二明不壞回向為真性無虧同流入俗名為不壞今以迦樓羅王託事顯之明於大海上以清淨目觀命盡之龍而以兩翼搏取之迦樓羅王此云金翅鳥王顯十回向菩薩常於生死大海之上以法空清淨智目觀有根熟衆生以止觀兩翼而搏取之安置自性清淨涅槃之岸此止觀以法性為止體以自性無性智為觀體非能觀所觀而有二事主戒波羅蜜戒淨故猶如大海不宿死尸明大悲大智戒不宿人天及三乘染淨二見之死尸故此金翅鳥取龍之時於一念頃掇身入海水水波未合取龍而出名為速疾力得道菩薩亦復如是以定慧觀察力從無明大海之際繫長短心一念應真古今三世一時見盡如是見道如是修道是名為發心如是發心先心難但明十住初心從凡夫地一念應真難故非為究竟佛果難故至於究竟不異初心故明法不異智慧不異時復不異以定慧照之可見情以思之即迷也第三緊那羅王明等一切諸佛回向以一切諸佛處於生死以法忍門以為萬行之主令一切衆生皆得菩提無上法樂故寄表緊那羅王此云疑神亦為行主似人而頭上有角口似牛口人見皆疑人耶非人耶故曰疑神明此位菩薩以十回向成大慈心以法忍力生於六道同行益生人見皆疑為凡為聖若是凡夫有智如佛若是賢聖行同凡事故以疑神寄表其行也此神能作行主與天作戲主忍波羅蜜門以忍為萬行主若無忍者萬行不成是故忍為行主此類畜生道攝第四摩睺羅王此云大蟒亦云大腹羅伽云胸腹行也主精進波羅蜜胸腹行者明趣求樂法利人匍匐謙敬也是精進義明至一切處回向六道四生無處不入此是守護伽藍神能護法故此中十王明精進波羅蜜中十波羅蜜第五夜叉王明無盡功德藏回向主禪波羅蜜以禪定夜叉守護一切衆生心令心不妄得大功德藏故夜叉者此云苦活或名伺察明以禪門守護伺察一切衆生苦活心令心不妄此天王領夜叉衆在須彌山北面第六毗樓博叉龍王主領龍衆在須彌山西此之龍王主隨順堅固回向明般若波羅蜜門如龍遊空能隱顯降雨潤衆生故以般若空慧自在有無雨諸法雨益衆生故第七等以鳩槃荼王主之是魘魅鬼神噉食精氣亦名冬瓜鬼如是惡衆生菩薩亦皆隨順是故名等隨順一切衆生回向乃至地獄悉皆遍入此神是南方天王領二部衆一名鳩槃荼二名薜荔鬼此鳩槃荼陰囊大如冬瓜若行乃擎置肩上坐時即踞之而坐明愛染貪求猶如餓鬼大悲菩薩盡興隨行斷一切貪求故主方便波羅蜜第八真如相回向乾闥婆王此云尋香有香氣處以作娛樂而求其食表真如相位菩薩常以真如法界戒定慧解脫解脫知見五分法身無染之香娛樂衆生令其愛樂故於中十王明願波羅蜜中十波羅蜜第九無縛無著解脫回向託事於月天子表力波羅蜜以無縛無著法性虗空智慧照燭衆生淨煩惱熱得法清涼故第十入法界無量回向以日天子託事表之明十回向中智波羅蜜如日處空下照萬有其位益上其功益下像此位菩薩其智甚高其行彌下徹至人天神鬼外道邪行畜生地獄盡同其行猶如日月其形在上其功在下善惡俱照故已上十王配十回向中十波羅蜜竟如十住十行十回向乃至十地一一位中波羅蜜各隨當位取意即得一例取之即不知其趣如是日月天子皆表十回向成大悲願行之門明悲智無依常以法空為體隨根普照無有所為任無功之智日稱萬有而成益世主妙嚴品十地法門十住十行寄表如神十回向位寄表如王於此十地寄表如天明其進修漸漸慣習殊勝此天名妙高天其山在大海中出水高八億由旬入水深八億由旬四寶合成北面黃金南西琉璃西面水晶東面白銀形如腰鼓上有四層級四天王各隨方所居四面其山頂上四埵埵列八天王各有部衆中頂帝釋居衆寶所莊嚴以是名妙高亦名妙峯山亦名忉利天此云能主天由帝釋能為天主也下有七重海重別金山圍繞迦樓羅速飛七日方始達金山有天居皆四天王所攝其上三十三天所有天身長一由旬衣長二由旬廣一由旬重六銖壽一千歲一日一夜同此人間一百年三十日為一月十二月為一歲已上依俱舍三法等論説此天王有五種名一名能主一名釋提桓一名憍尸迦一名天帝釋一名因陀羅天此名天主具云釋迦因陀羅釋迦者此名百也為先因百度設無遮齋得作天主此配歡喜地中檀波羅蜜此位菩薩對治觀行苦空無常世法非實皆從十二緣生本無體相成於捨法身命財等如是於諸佛法信順修行且治欲界粗慳吝業行檀波羅蜜於十二緣生未善了知六地菩薩方明十二緣法如鍊真金數數入火喻明對治慳障第二復有無量須夜摩天王表離垢地為此天離地際故依空而居有衆妙樂也像此位菩薩戒波羅蜜增勝有法樂以法身為戒體故漸增進離前地世間繫故初地檀度為勝此位上上十善淨戒為勝名為離垢初地須彌之頂世界與人連寄同世間此位以空居寄同出世間故名離垢初地喻鍊真金未云加藥但數數入火轉轉明淨此地鍊真金加以礬石轉令明淨以戒為礬石故夜摩天此云時分天也為此天無日月天光自相照不分晝夜但蓮華開合知其晝夜時分故此天身長二由旬衣長四由旬廣二由旬衣重三銖壽二千歲日月歲數與前天倍此位修上上十善戒治欲界現行粗惑習氣三地修九次第定方無三界煩惱生如來家同如來性第三復有不可思議兜率天王此名知足天佛地論云最後身菩薩於此教化如瓔珞本業經十一地等覺地始名一生補處方名最後身配在第三禪此知足天為最後身菩薩在中者皆是如來隨時方便設法利生不可定也前位明以上上十善淨戒離欲界現行粗惑垢故此位菩薩以九次第定淨色界無色界并欲界心習得出三界心作鍊金喻善巧鍊之不失銖兩轉轉明淨明以九次第定鍊之以法眼觀之以行加之無虧本法但轉明淨欲界修定以治欲障上界修慧以治定障如是對治隨順法行方便利生無所染著名發光地以忍波羅蜜為體此天身長四由旬衣長八由旬廣四由旬壽四千歲日月歲數皆與前天倍此知足天當修三法得生其中所謂戒定慧若但修戒施即生餘天若一乘法中其事不爾以智遍周以為天體故第四化樂天王表𦦨慧地菩薩像此天處常以變化以悅自樂亦名樂變化天心外無境從心變故此天王衆有十天王皆是精進波羅蜜中十波羅蜜常以精進波羅蜜為體此位作鍊真金作莊嚴具喻精進明修三十七助道之觀對治三界邪業習故此天身長八由旬衣長十六由旬廣八由旬壽八千歲日月歲數與前天倍衣重一銖食甘露味第五復有無數他化自在天王託事表難勝地為此天在欲界頂明菩薩欲境難超故故曰難勝地此位菩薩常以禪波羅蜜以為觀體魔王波旬居此天中修十諦觀即為菩薩位不修觀者是魔眷屬又此天名他化自在以他變化以為自樂像此位菩薩常教化衆生令他得樂以為己樂此天身長十六由旬衣長三十二由旬壽命歲月悉與前倍第六復有不可數大梵天王明現前地以初禪是色界無女人生無欲界染故依佛地論云離欲寂靜故名梵身又依長阿含云梵衆中以梵音語故故名為梵又尸棄者或云持髻或云螺髻或云火頂以火災至此天故修得初禪者得生此天此天王於梵衆中發大梵音諸天各自謂言唯共我語於大千界最得自在顏如童子身如白銀色長半由旬衣如金色無男子形禪悅為食壽命一劫於中有十大梵王明般若波羅蜜中十波羅蜜第七復有無量光音天王明遠行地此二禪天初禪滅憂二禪滅苦明此位菩薩在七地諸行已終大悲圓滿四攝四無量十波羅蜜三十七助道法常在現行自苦已無常度他苦染淨二障此位通過譬如真金飾以衆妙雜寶轉更殊勝明以法身為金體悲智萬行圓滿為衆妙寶互為莊嚴常以行網教光普化一切衆生故故像此天已滅憂苦以心淨故出語口中光生此有十大光音天以明方便波羅蜜此天身長二由旬壽二劫此天水災至第八復有無量遍淨天明不動地菩薩明此天憂苦已無唯有禪悅像此位菩薩功用已終唯有法悅法悅習氣十地始無此天風災至為有禪悅喜動其性像此位菩薩無功智現前猶有無生法樂智淨習氣第九復有無量廣果天明善慧地為此第四禪無出入息三災不及又此十天皆以寂靜法門而作宮殿表九地善慧莊嚴以百千阿僧祇陀羅尼門法寶宮殿教化衆生能以一箇言音為一切衆生説種種法無心意識像此天無思意識能為語言此天無下界意識有色界意識乃至非想天皆有微識若識想盡即非三界業收故於中有十天王明力波羅蜜中十波羅蜜此天身衣及壽與前天皆倍明此位菩薩常以法宮而為安止以福德廣大名為廣果天第十大自在天王表第十法雲地明此位無相智成如菩薩本業瓔珞經云十地之中心色二習一時總盡十一地方心境二緣中得無礙自在從八地至十地於十一地普賢門猶未自在如十定品中求覓普賢不見者是又智度論云第九天外更別有十地菩薩天名摩醯首羅此天有八臂三目騎白牛一念知三千大千世界雨滴之數此是引進菩薩方便設法託事表法及攝化境界漸增勝故一乘法界理事同參一微塵內諸佛國土人天同處身塵毛孔如影相入修真之者須當如實而知莫隨化相應如來現相品自此現相品至普賢三昧品世界成就品華藏世界品毗盧遮那品此五品經總是答前三十七問明舉果勸修分普賢三昧品理智無邊名之為普智隨根益稱之曰賢三之云正昧之云定亦云正受為正定不亂能受諸法憶持簡擇故名正受為普賢為佛紹法界大智之家諸佛萬行遍周之長子善簡衆法令衆生迷解故須入定然普賢菩薩體無定亂以示法則故須如是明普賢菩薩常在三昧靜亂總真然教化衆生故明初入法須加定業一萬諸龍寄位是凡表凡夫有得入者故若有人言此經非是凡夫境界是菩薩修行是人當知滅佛知見破滅正法令其正教世不流通令其世間正見不生斷滅佛種諸有智者不應如是不勸修行設行不得不失善種猶成來世積習勝緣故此三昧以法界根本智為體以差別智為用又以法界根本智為體隨衆生行為用又以入三昧為體出定為用又以無入無出為體入出俱為用又以入出俱為體大要言之且以為化衆生法則以入定明體後從定起顯示十種定名是用於十箇定名中總以法界無依住智性為體此體亦名首楞嚴定與不可説一切諸三昧諸智慧門為體如經云世界海漩無不隨入者海者廣大義漩者甚深義明此三昧體用廣大甚深無盡諸佛菩薩及一切十方六道衆生中行皆遍故世界成就品今釋此品為明世界海依住形相苦樂淨穢皆是衆生自業果報之所莊嚴不從他有佛菩薩世界海依不思議變化力之所成就故名世界成就品令始發心者知衆生界廣大等法界虗空界如影相入重重無盡依住各別佛菩薩行悉充滿故令始發心菩薩知諸佛菩薩境界海衆生境界一異不可得故隨衆生自業轉變故剎海轉變隨自業成壞故剎海成壞若不説衆生界法界佛界菩薩境界虗空界無二無盡如影重重依住者所有發心者設不入二乘道修菩薩行但得權教菩薩心常染淨而有限礙不入佛境界有自佛他佛及以國剎分劑有往來所依處故如三乘中所説淨土在於他方菩薩願生其中是也説此品者意欲令初發菩提心者知衆生境界諸佛境界廣大之相重重無礙令現在未來發菩提心者識佛所行衆生業海無際如來以普賢行普濟以法性理智無礙從初發心興大願雲悲智普覆以波羅蜜海無剎不現其身無行不同其事塵毫內剎影現重重平等智身莫不隨入令學者倣之趣求不謬此乃如大王路法爾常然更有異求偏僻不當也華藏世界品將釋此品略作十門分別一釋品來意二釋品名目三釋華藏世界海因何報得四釋華藏世界形狀安立五配華藏世界安立屬因六釋華藏世界海純雜無礙七釋華藏世界海圓攝三世業境八釋華藏世界本空出生所緣九明華藏世界因何得隱現自在十隨文釋義三釋華藏世界因何報得者以從初信心至於八地已來恆以大志願力持令其不退菩提諸波羅蜜海教化饒益一切衆生至於八地任利無功當知風輪是大願波羅蜜所成報故衆生世間妄想業風所持如來世間以大願力智風能持諸境為以智能隨願願能成智還以大願法身大智之所報成風輪之體若不以法身一切諸行總有為故若無至願法身無性不能自成何況成他以此三事為緣方堪利生不滯空有進修功熟任利無功且取初因大願為首令持萬境總以大願智風以為持境如是華藏世界所有莊嚴總是風輪上持諸境由諸福行本從願生還將本因以持諸果以此用願波羅蜜能成一切諸波羅蜜海以本因如此故因果相持一切莊嚴以願波羅蜜互體相參能持其上諸行報得一切莊嚴蓮華藏體是法身隨行無依住智體之所報得宮殿總大悲含育之所報得樓閣即是智照觀根順悲濟物之所報得其地金剛平等自性法身之所報得但是諸莊嚴中所有金剛為莊嚴者皆法身隨行之報但是摩尼莊嚴皆法身成戒體隨行報得金剛輪圍山即是大悲戒防護之業之所報得衆華莊嚴者萬行利生開敷衆善之所報得寶樹莊嚴者建行利生覆蔭含識之所報得略而言之且復如是廣説報業所因不可具悉夫報不虗得皆有所因若不知因云何修果六釋華藏世界純雜無礙者為佛所行之行遍法界衆生界故既是行遍所得依果亦遍但業不相應者同住居而不見猶如靈神及諸鬼趣與人同處人不能見如經云譬如人身常有二天隨逐天常見人人不見天此經為佛行周遍依正亦遍不同三乘推淨土於餘方而致去來自他之相為彼小心根劣者且如是設教網故畢竟求大菩提心者還須歸此不二之門興遍周法界之行願也七明華藏世界圓攝三世業境者明此教法一念三世故一念者為無念也無念即無三世古今等法以明法身無念一切衆生妄念三世多劫之法不離無念之中以是義故此華藏世界所有莊嚴境界能現諸佛業衆生三世所行行業因果總現其中或過去業現未來中或未來業現過去中或過去未來業現現在中或現在業現過去未來中如百千明鏡俱懸四面前後影像互相徹故為法界之體性無時故妄計三世之業頓現無時法中是故經言智入三世而無來往八釋佛國本空何為華藏世界出生所緣一為明二乘雖得解脫三界粗業無有福智不利衆生滯於涅槃二為三乘菩薩有樂生淨土淨相常存障法性如理染淨當情知見不普情存淨土不得自在不如此法隱現自在為利衆生顯勝福德故即具相萬差光明顯照若令衆生情無取著如幻雲散一物便無無有所得存其繫故三為怖一切法空衆生為法空無相之理謂言斷見空無福智不樂觀空樂取相縛隨境存業不能解脫者所現福德依正果故令觀空法空却無明成福德業四總為一切三乘及一切凡夫現廣大願行福智境界量度樣式令其倣學不偏執故經云諸佛國土如虗空無等無生無有相為利衆生普嚴淨本願力故住其中九明華藏世界因何得隱現自在者為從一切法空之理隨智現故得隱現自在世間龍鬼具有三毒猶能隱現何況法空空諸三毒純清淨智不能隱現自在如善財入彌勒樓閣以三昧力具見衆莊嚴從三昧起忽然不見一相都無善財白言此莊嚴何處去彌勒答言從來處去曰從何處來曰從菩薩智慧神通來依菩薩智慧神力而住無有去處亦無住處非集非常遠離一切又如幻師作諸幻事無所從來無所至去雖無來去以幻力故分明可見彼莊嚴事亦復如是無所從來亦無所去雖無來去然以慣習不可思議幻智力故及往昔大願力故如是顯現華藏世界亦復如是以如來大願智力法性自體空無性力隱現自在若隨法性萬相都無隨願智力衆相隨現隱現隨緣都無作者但以理智法爾自具不思議功不思議變無能作者自在隱現凡夫執著用作無明執障既無智用自在順法身萬象俱寂隨智用萬象俱生隨大悲常居生死但隨理智生死恆真以此三事隱顯萬端不離一真之智化儀百變毗盧遮那品此第二會前之五品以舉現世毗盧遮那佛果恐不成信何以然者為古無舊迹今何所來以此引古證今明道不謬成其信者不狐疑故問曰古佛今佛為一為異答曰為一為異何以然者為法身智身九十七大人之相大慈大悲智慧解脫是一各各衆生發心成佛是異又無量三世諸佛皆同一念成佛無前後際是一然亦不壞一念中見無量衆生三世劫量是異文中有四佛出世總明毗盧遮那一號各隨世間應緣名異非是佛名號有異世間一切名號皆是諸佛名為如來德遍一切法故猶如虗空遍含衆法無不淨故一切衆生名入佛名號無不淨故問曰此中一種是人非天龍神何得業報神通衣服飲食隨念而至又所居高勝依報寶嚴以何業故報得如是答曰為因廣大故業報廣大為因高勝故業報所居高勝問曰何者是因廣大高勝答曰為於往因於此毗盧遮那法界智體用無依住門性清淨法而生信心修信解力常信自他凡聖一體無所依住無我無我所心境平等無二相故無我所故一切凡聖本唯法界無造作性無生滅性依真而住住無所住與一切諸佛衆生同住性真法界所有分別是一切諸佛本不動智凡聖一真共同此智全信自心是佛種智及一切智故不於心外別有信佛之心亦不於自心之內見自心有佛相故信如斯法以此信因高勝廣大獲得如斯勝妙依正果報故問曰何故此佛蓮華化現出興釋迦佛母胎出現答曰隨根所見母胎出現惟劣解衆生自根見爾如離世間品云為劣解衆生母胎出爾應大根衆生皆見蓮華出現也此第二會六品經明菩薩信心門在普光明殿以果成信信自己心是佛此一段約有六法一佛名號品令信心者信佛名號遍一切世間名知名性離故二四聖諦品令信心者自信一切世間苦諦即聖諦不別求故三光明覺品令信心者自以自心光明覺照一切世間無盡大千世界總佛境界心境合一內外見亡還以東方為首光至東方十三千大千世界百三千大千世界如是十方十重倍倍周回十方圓照身心一性無礙遍周同佛境界如是觀察然後以無作方便定印之入十住初心生如來智慧家為如來智慧法王真子一如光明所照不可作佛光明自無其分須當自以心光如佛光開覺其心圓照法界四問明品令信心者明所信之法門五淨行品令信心者回無始妄念以成智海無生滅性六賢首品令信心者信佛神力通化無邊得大自在及信心之福信此六法觀行相應名為信心初會是舉佛果勸修信諸佛所得此第二會一會以果成信信自心是佛與果佛不異故十方世界無有一名非佛名者名體性自解脫故但隨衆生所聞不同此明佛名號遍周即明於一切名無所著故大意令衆生達自根本無明本唯如來根本大智令諸衆生頓識本故頓作佛故下舉十箇根本不動智佛以成十信舉十箇月佛同號之為月以成十住明創契法身本智心得清涼明此位菩薩契理惑亡得法性智清涼故十行位中以十箇眼佛同號之為眼為明十行以智知根利生攝益故佛號為眼十回向中以十箇妙佛同號之為妙為明十回向位中菩薩進修漸熟妙智現前故佛號為妙十地同妙已上從十信中自信自心分別之智與一切諸佛根本不動智本來是一以成信心心外見法不成信心也故一切諸法總名佛號為一切諸法及以名言自體性離故一切法自體性離即法界性法界性即佛號也是故一切法及名言皆是佛號故為如來稱此一切自性離之法以成佛故文殊師利即是自心善簡擇無相妙慧覺首目首等菩薩即是自心隨信解中所見理智如是三乘之人未回心者定當不信何以故為立三阿僧祇劫後當得佛故為直認自身及心總是凡夫但言佛有不動智等不自信自心是根本不動智佛以是義故法界乘中以根本智為信心此經信心應當如是直信自心分別之性是法界性中根本不動智佛金色世界是自心無染之理文殊師利是自心善簡擇妙慧覺首目首等菩薩是隨信心中理智現前以信因中契諸佛果法分毫不謬方成信心從此信已以定慧進修經歷十住十行十回向十地十一地日月歲劫時分無遷法界如本不動智佛如舊因果不遷時劫不改方成信也若立僧祇定是凡夫凡聖二途時劫移改心外有佛不成信心即世間人情量直是生死長流常隨見網何太苦哉以此如今第二會及初會明始成正覺如來出現後三十二品又著如來出現品明始終信進修行者與三世佛一時出現明法界總一時故如持寶鏡普臨衆像頓照顯現無前後時故明於法界根本佛智境界中頓現衆法不可將情量度量作前後解故一依彌勒樓閣中境界初會中始成正覺佛是舉果勸修佛出現品中佛是明諸菩薩進修五位因果行終佛與信位中不動智佛相對故又此五位中修行位位各有佛果三乘教中前位向後位但有菩薩果非佛果也如下文殊師利所説佛號即此當品及通一部總為信心總信五位中因果心無滯礙方可以行修行譬如有人過五百由旬嶮道先知通塞然後行往喻如十信菩薩於信心之中先知五位進修通塞預以願行防之以信自心分別之性本是一切諸佛不動智體用防那見外取他境故以隨位妄識散動障真智故以是義故十信之心總通五位悉皆成信今此一部之經頓舉五位因果諸佛果門總成信也從總信已入位修行方始不迷理智如人造食五味一時頓熟方始食之從初食時五味同食乃至食竟其味不離五也明五位因果十信總明時亦不移畢竟佛果不離初信之法如依樣畫像等問曰一切衆生本有不動智何故不自應真常淨何故隨染答曰一切衆生以此智故而生三界者為智無性不能自知是智非智善惡苦樂等法為智體無性但隨緣現如空谷響應物成音無性之智但應緣分別以分別故癡愛隨起因癡愛故即我所病生有我所故自他執業便起固執取故號曰未那以未那執取故名之為識因識種子生死相續以生死故衆苦無量方求不苦之道迷不知苦者不能發心知苦求真者還是本智會苦緣故方能知苦不會苦緣不能知苦知苦緣故方能發心求無上道有種性菩薩發心信解種強者雖受人天樂果亦能發心求無上道是故因智隨迷因智隨悟是故如人因地而倒因地而起正隨迷時名之為識正隨悟時名之為智在纏名識在覺為智識之與智本無自名但隨迷悟而立其名故不可計常計斷名也此智之與識但隨迷悟立名若覓始終如空中求迹如影中求人如身中求我依住所在終不可得故新長短處所之相也如此無明及智無有始終若得菩提時無明不滅何以故為本無故更無有滅若隨無明時不動智亦不滅為本無故亦更無有滅但為隨色聲香所取緣名為無明但為知苦發心緣名之為智但隨緣名之為有故體無本末也如空谷響思之可見佛名號品問曰以東方表法況喻十信初首如金位在西方何故東方為金色世界以表法身為金色顯根本智為不動智答曰此問甚彰道理如經所説以信心為胎至十住之位名初生佛家今以東方為金色世界者明金正月胞二月胎三月成形四月生於巳五月養於午六月冠帶於未七月相八月王明十信如胎故以東方金胎表之如金色世界此是舉十信初因如南方妙色世界西方蓮華色世界等是十信進修之勝用云結跏趺坐者以會世間衆緣為一法界名之為結以一法而稱多緣名之為跏又結跏趺坐者是安靜不動威儀之相故經云南方表法中南為正為日為明為虗無為離中虗故善財入道進修即南巡諸友表南方為正為日為明為虗無之理是故禮佛皆云南無明南方虗無也法界品是此一部經之大體一切凡聖之本源初會信佛果即以如來并普賢為首明已成佛果及已行之果生信今以入自己入信修行門即以文殊師利及如來名號并四諦法門為所信之因果即明以妙慧法門及名言而修學問曰何故如來不自説其教何用放光令菩薩説答曰如來意令當位菩薩説當位法門令修學者知分劑易解故文殊常與一切諸佛及一切衆生作信心之因成妙慧之本母普賢菩薩常與一切諸佛衆生作修行之因以此二人成就菩提無作智果大悲之海令二人自相對問説如來出現品明是修行者因果始終圓滿前後因果性果智果行果相徹一體令後學者易解故四聖諦品諦者實義也明如來説四種實義令諸衆生起信解故問曰何故不説多但云四答曰此四種諦義總攝多故為明一切世間不離苦集一切出世間不離滅道滅盡諸苦名為滅諦滅盡涅槃名為道諦三乘涅槃皆有可得此大涅槃無餘可得名為道諦以二乘趣寂菩薩多生淨土又推淨土在餘他方又云菩薩留惑潤生故若不故留煩惱還應必有涅槃可證或有他方淨土可生是故三乘涅槃皆有可得又閻浮提成正覺佛木樹草座是化佛上方摩醯首羅天紅蓮華上佛是實報皆有欣厭故是故三乘四諦厭苦集欣滅道名四諦法輪此一乘經言四聖諦者是其實義何以故達苦性真無欣厭故無有他方別佛剎別淨土故無有染淨涅槃生死有欣厭所修道故所修道者住如法住修如法道不厭不著不欣不取一如法界無去來性無住處性身塵毛孔心之及境皆稱法性如是信解如是修道以是義故一乘四聖諦三乘四諦各各差別各有信解如來依根方便設教皆非凡夫能立如法華經為聲聞人説四諦法為緣覺人説十二因緣為諸菩薩説六波羅蜜亦是如來隨時之説大要總言此四聖諦十二緣生法門但一切諸聖一切凡夫起信樂佛法心道未滿者皆從初心觀自他苦故發菩提心樂求道法但依大小勝劣不同四諦十二緣各別但一切世間法四諦義無不該通如纓絡經立九乘法門者一聲聞聲聞乘二聲聞緣覺乘三聲聞菩薩乘如是三乘中各有三通為九通此法界不思議乘於解脫道中總有十乘皆得究竟無三界苦諸餘道門皆是人天世間生滅之法設得少樂終竟不離苦本三乘雖得出三界其道未真未是佛果乘故光明覺品一切處文殊師利同時説頌明信心者從初自信如是十色世界十智如來十首菩薩總是自己果行法性大智萬行遍周以成信故從此修行經歷五位不離此也是故發心畢竟二不別如是發心先心難自未得度先度他是故我禮初發心初發以為天人師超勝聲聞及緣覺此明從凡入信心者難故為凡夫總自認是凡夫不肯認自心是不動智故是故入十信難明十信心成就任運至十住初發心住乃至究竟佛果故如三乘中修十信心經十千劫此教中為以根本智法界為教體但以才堪見實即得不論劫量如覺城二千之衆善財為首者是路上發心六千比丘之衆亦皆是智慧猛利人類精奇一聞多曉悟謙恕仁慈專求大道以利含生皆是一生信滿發心入位人也若不信自心元是不動智佛者即永劫飄淪何能利人濟物如經所説若自有縛能解彼縛無有是處是故發心有二種一修信解發心但修十信解故即如前十智如來十首菩薩是二信滿發心十住位初名初發心住故即十慧菩薩十箇月佛是其因果也問曰何故成十信門皆文殊師利説法答曰為明文殊是十方諸佛妙慧善簡擇正邪正邪既定方以行修行即名普賢行也明文殊師利是童子菩薩以因創發啓蒙入信之首故因行成名也菩薩問明品此問明品即是明十信心者正修行之行及斷疑故文殊善問世間善惡因果不相知業能成就善惡因果覺首菩薩便以法不相知以真理答但為迷真自作業爾知真者但以全業是真為明覺此隨流生死業體本性恆真而無流轉眼耳鼻舌身意恆如法知非流轉生死性故亦不虗妄亦無真實但為無貪瞋癡愛真智慧故名之為真故説如斯法利衆生為以此當體無明諸業因果上自覺覺他令知法界自性真理真妄兩亡名為覺首以信此法初名為首也明十信初心全信自身眼耳鼻舌身意及以一切衆生全體真妄兩亡唯佛智海故故以不動智佛十智如來為十信位中自己果金色世界妙色世界蓮華色世界等十色世界是十信之中所信理文殊師利覺首財首等十菩薩衆是十信行問曰何故頌初云文殊法常爾答曰為文殊是諸佛之慧不動智是體文殊是用以將此一切諸佛一切衆生根本智之體用門與一切信心者作因果體用故使依本故迄至究竟果滿與因不異無二性故方名初發心畢竟心二種不別明此十信心難發難信難入聞之者皆云我是凡夫何猶可得是故佛設少分信者即贊神通道力是故當知且須如是正信方始以正信正見法力加行如法進修世界名金色者明金胎二月表十信為聖胎故佛號不動智者為無明本空無體可動名不動智但應境知法應器知根如響應聲無有處所形體可得名之為智無可取捨名為不動三配當位因果者以妙慧善揀擇法顯智故以妙慧為因不動智為果若以慧由智起即以不動智為因妙慧文殊為果或智之與慧總因總果明體用一真無二法故亦智之與慧總非因非果為體無本末依住所得故此是性法界自在知見非如世間因果比對可得故此文殊師利不動智佛初起信心即從此起乃至信終亦不離之迄至自行圓滿示成正覺亦不離之故以佛智慧示悟衆生令衆生入佛知見佛知見者文殊師利妙慧不動智佛是此是凡聖等共有之佛示凡夫使令悟入淨行品此品以本淨智問其妙慧説一百四十淨願用淨信等六位中染淨無明七地法執現行十地已來法執習氣佛地二愚一時總淨於此信心之中不令偏執以願防之使令寂用無礙以此諸佛本淨智妙慧門説一百四十大願以防染淨二障故以六位上通信并十住十行十回向十地十一地隨位修道上煩惱皆因身見邊見二見有二十總有一百四十為防此障起一百四十願令此進修者從初信心理事圓融使信心者達其願體無虧自心根本淨智妙擇之慧動寂俱真不偏修故由是義故信心之上法性悲智妙慧萬行總依佛有而為進修不得別有若離佛別有自法者不成信心不成十種勝解不成修行設苦行精勤是邪精進賢首品信心有二一三乘二一乘如起信論有三種發心一信成就發心經一萬劫善根相續方至不退二者解行發心以佛菩薩教令發心或自有大悲或以正法欲滅護正法發心論云如是信心成就得入正定聚畢竟不退名住如來種中正因已前二種是不退發心三證發心者若有衆生善根微少久遠已來煩惱深厚雖值佛亦得供養然起人天種子或二乘種子設求大乘根則不定或進或退大意依他發心或以二乘教令發心解行不實有得有證有捨有取總住退位二一乘發心如此經十信發心初發心時以初會中如來始成正覺之果普賢菩薩法界微塵毛孔重重無盡隨根本智行果而起信心信自心佛智與古今三世諸佛同一體用分毫不差方名為信發心從此信心以佛名號品明所信十方示成正覺佛果之號遍周四聖諦品明三世諸佛所説法門遍衆生界光明覺品明如來智慧光明境界遍照法界無有盡極令發信心者以觀觀之令心廣博如佛境故菩薩問明品明十信心菩薩十種所行之法是自己所修之行淨行品一百四十大願即是十信心位所發大願成大悲門具普賢行賢首品明十信心所欣佛果功德無有盡極明初發十信心誦持此品功德勝過供養十佛剎微塵數佛經於一劫何況隨其解行而以修治如此經十住初心才發心時法爾身遍十方示成正覺大意明此經發十信心但以法界不思議乘一切智乘而發其心不依佛不依佛法不依菩薩法不依聲聞法獨覺法不依世間法不依出世間法而發其心但無所依發菩提心但以一切智發菩提不如三乘依倚物故發菩提心不依三祇劫後有佛果故發菩提心不依現在三世有佛果故發菩提心以是義故入此信者皆無有退故設習氣未淳熟者暫時念退信及住位一住不退為正信自己身心總是法界佛無自他性故以十方諸佛智身如影所言如響如是信解當得成佛我今信者亦如是知如是信解云何有退全身全心一切境界總是法界一真法身體用理智住在何所退至何處若也身心有所依住放却依處即有退失自了身心本無依住本無所得一切語言分別如空中響應無作緣任物成聲本無依住了如斯法而生信解即無退轉有所依法而發心者放却所得所依著處即有退轉是故起信論云證發心者多住退位為有所得可證故是故乘此不思議乘一切智無依住乘發菩提心一往不退若有退者只為信心不成故於佛教法及如來所乘有所得故有取捨故未成信故不入信流
