front:
  text: 李長者華嚴經合論序此經則天證聖年三藏實叉難陀奉詔譯也天冊金輪聖神皇帝序曰蓋聞造化權輿之首天道未分龜龍繫象之初人文始著雖萬八千歲同臨有截之區七十二君詎識無邊之義由是人迷四忍輪回六趣之中家纏五蓋沒溺三塗之下及夫鷲巖西峙象駕東驅慧日法王超四大而高視中天調御越十地以居尊包括鐵圍延促沙劫混太空而為量豈算數之能窮入纖芥之微區匪名言之可述無得而稱者其唯大覺歟朕曩劫植因叨承佛記金仙降旨大雲之偈先彰玉扆披詳寶雨之文後及加以積善餘慶俯集微躬遂得地平天成河清海晏殊禎絶瑞既日至而月書貝葉靈文亦時臻而歲洽踰海越漠獻賝之禮備焉架險航深重譯之詞罄矣大方廣佛華嚴經者斯乃諸佛之密藏如來之性海也緬惟奧義譯在晉朝時逾六代年將四百一部之典才獲三萬餘言唯啓半珠未窺全寶朕聞其梵本先在于闐國中遣使奉迎近方至此既覩百千之妙頌乃披十萬之正文以證聖元年於大遍空寺親受筆削敬譯斯文遂得甘露流津豫夢庚申之夕膏雨灑潤後覃壬戌之辰式開實相之門還符一味之澤豈謂後五百歲忽逢金口之言娑婆境中俄啓珠函之祕乎至開元中方山長者李通玄撰為合論通玄之自序曰有情之本依智海以為源含識之流總法身而為體只為情生智隔想變體殊達本情亡知心體合今此大方廣佛華嚴經者明衆生之本際示諸佛之果源其為本也不可以功成其為源也不可以行得功亡本就行盡源成源本無功能隨緣自在者即此毗盧遮那也於是寄位四天示形八相菩提場內現蘭若以始成普光法堂處報身之大宅普賢長子舉果德於藏身文殊小男創啓蒙於金色以海印三昧周法界而降靈用普眼之法門覩塵中之剎海依正二報身土交參因果兩門體用相徹以釋天之寶網彰十剎以重重取離垢之摩尼明十身而隱隱無邊剎境自他不隔於毫端十世古今始終不移於當念此方如是十剎同然聖衆如雲海會相入智凡不礙狀多鏡以納衆形彼此無妨若千燈而共一室出現品內示因果以結始終給孤獨園利人天之明法界目連鶖子隔視聽於對顏六千比丘啓十明於路上覺城東際五衆咸臻古佛廟前同登十智善財發明導首用彰來衆齊然及至大中載福州開元寺沙門志寧復以論入經仍自述曰華嚴經者蓋非羅漢結集亦非小聖傳持大本華嚴非佛不能知見中本華嚴住地菩薩乃知小本華嚴即十萬之偈今之所傳只獲四萬五千餘偈經云如人化心化作佛化與不化等無異一切諸佛成菩提成與不成無差別善財童子成道只在一生六千比丘發智不由多劫白牛之駕將悟即以超於大乘金色世界現前文殊之智全證法華龍女成佛只在剎那妙峰見佛光明初住便登大唐欣代之間有長者李通玄造斯經論四十卷志寧覽此論文得其大意今見此方君子以論與經難為和會志寧不揆衰邁將此論文注於經下使後之覽者無費乃心才如開經便得見論論從第八卷起注入經兼論與經共成一百二十卷其會釋七卷寫附於前又至乾德歲沙門慧研又撰為序曰此教非貝巖所編乃文殊結集總三部一部有十三千大千世界微塵數偈一四天下微塵數品一部有四十九萬八千八百偈一千二百品一部有十萬偈四十八品隱乎龍藏未擅閻浮逮從正法光餘年將五百則第十四代祖師龍樹運神海藏觀前二部非世人所及乃誦後部歸於五天傳布千年方垂華夏東晉初譯地湧靈泉唐朝次翻天降甘露玄宗開元中太原有逸士李通玄者窮八十卷之真詮括四十軸之玄論夜驅神筆舒玉齒之祥光日探幽玄感天童之給膳張皇教海羅列義天大中載無諸有高僧志寧緬思後進之披尋難測法門之豐富遂合經論文旨相須然其義類繁衍未圓品藻慧研因參雲水叨覽指歸敢搵箋毫釐斯漏略列經論以標舉彰教理而相收義朗文清不假猊臺而抱帙神輝智發何勞鷲嶺以尋師卓和尚曰備矣先佛為經後佛為論佛志寧合經論而為一佛慧研釐經論以標綱皆不過為後代佛子便於觀覽故耳其用心勤矣然一百二十卷之繁吾恐一切賢聖終未敢輕易也破夏以來獲聽寧佛者袁文煒細讀華嚴合論一遍乃知善說華嚴無如長者因簡其尤要者録之儻有大心衆生欲乘如來乘直至道場則此二百紙簡要之論文便是華嚴無盡藏之法界也自心是毗盧遮那佛智自眼是佛文殊根本智自身是佛普賢差別萬行智自誦是佛音聲自聽是佛觀世音力自語是佛開不二之門自念是佛不思議神通自在功德皆佛也吾何幸身親見之李長者事迹李長者諱通玄莫詳所自或有詢其本者但言滄州人開元二十七年三月望日曳䇿荷笈至於太原盂縣西四十里同潁鄉村名大賢有高山奴者尚德慕士長者詣其門山奴諦瞻神儀知非常器遂罄折禮接請歸安居每旦唯食棗十顆柏葉餅子如匕大者一枚自爾不交外人掩室獨處含毫臨紙會無虗時如是三稔一旦捨山奴南去五六里至馬氏古佛堂自搆土室寓於其側端居宴默亦又十年後復囊挈經書遵道而去二十里餘次韓氏別業即今冠蓋村焉忽逢一虎當塗馴伏如有所待長者與之曰吾將著論釋華嚴經可與吾擇一棲止言畢虎起長者徐而撫之遂將所挈之囊挂於虎背任其所止於是虎望神福山原直下三十餘里當一土龕前便自蹲駐長者旋收囊裝置於龕內虎乃屢顧妥尾而去其龕瑩潔圓回廣袤尋丈自然而有非人力成龕之四旁舊無泉㵎長者始來之夕風雷暴作拔去一古松高三百餘尺及旦松根之下化為一潭深極數尋回還五十餘步甘逾瑞露色奪琉璃時人號為長者泉至今澄明未曾增減𠍴陽之歲祈之必應長者製論之夕心窮玄奧口出白光照耀龕中以代燈燭居山之後忽有二女子容華絶世皆可笄年俱衣大布之衣悉以白巾幪首姓氏居處一無所言常為長者汲水焚香供給紙筆卯辰之際輒具淨饌甘珍畢備置長者前齊罷撤器莫知所止歷於五祀曾不闕時及著論將終遂爾絶迹謹按華嚴舊傳東晉三藏佛䭾跋陀羅於江都謝司空寺譯經有二青衣童子忽自庭沼而出承事梵僧爇香添瓶不離座右每欲將夕還潛沼中日日皆然率為常事及譯畢寫淨沉默無迹長者感通事符曩昔長者身長七尺二寸廣眉朗目丹脣紫肥長髯美茂修臂圓直髮彩紺色毛端右旋質狀無倫風姿持異殊妙之相靡不具足首冠樺皮之冠身披麻衣長裙博袖散腰而行亦無韋帶居常跣足不務將迎放曠人天無所拘制忽一日出山訪舊址之里適值墅人聚族合樂長者遍語之曰汝等好住吾將歸去衆乃罷樂驚惶相顧咸皆惻愴必謂長者却還滄州揮涕同詞懇請留止長者曰縱在百年會當歸去於是舉衆却送長者入山至其龕所復語之曰去住常然耳汝等可各還家及衆旅踵之頃嵐霧四起景物不分行路之人咸共駭異翌日長叟結徒登山禮候但見姿容端儼已坐化於龕中矣時當三月二十八日報齡九十六有一巨蛇蟠當龕外張目呀口不可向近衆乃歸誠致祝某等今欲收長者全身將營殯藏乞潛威靈願得就事蛇因攝形不現耆舊潸泣輿荷擇地於大山之陰纍石為墳即神福山逝多蘭若今方山是也初長者隱化之日及成墳之時烟雲凝布巖谷震蕩有二白鶴哀唳當空二鹿相叫連夕其餘飛走悲鳴滿山鄉原之人相率變服追攀孺慕若喪所天每當建齊即墳上雲起七七如是至大曆九年二月六日有僧廣超於逝多蘭若獲長者所著論二部一是大方廣佛新華嚴經論四十卷一是十二緣生解迷顯智成悲十明論一卷傳寫揚顯遍於并汾廣超門人道光能繼師志肩負二論同遊燕趙昭示淮泗使後代南北學人悉得參關論文宗承長者皆超光二僧流布之功比歲僧元覘特抵方山求長者遺迹初禮石墳次尋龕趾龕前有松三株俱是長者手植長者將化之月一株遂枯至今二株常有靈鶴結巢於頂又於壽陽南界解愁村遇李士源者乃傳論僧廣超之猶子也示長者真容圖瞻禮而回斯為滿願矣雲居散人馬支纂録
