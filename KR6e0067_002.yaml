body:
  text: 唐滄州長者李通玄合論明溫陵長者李贄簡要明吳興後學董廣𥌓閲正第三明教義差別夫三界大雄應真寂寞身心性相都無所為然以性起大悲稱法同體從無作智隨緣教生一雨普滋任生各異或名同而義別即漸教十地圓教十地等或言別而義同十方世界法門皆是四諦法門或理事兩乘或體用相徹或初或漸或頓或圓法不自施依根教立根羸則法劣器廣則道圓稱物所宜大小隨見或樂門前之駕廢遊露地之乘且約最上之徒及漸漸之衆粗陳十法使始學之流不以滯權而妨實也一佛日出興教主別此教即以毗盧遮那為教主梵云毗者種種盧遮那云光明遍照又毗之云遍以大智種種光明照諸衆生根機此即以法身悲智為名不同權教以姓為號牟尼者此云寂默但且讚法體無説不言智悲二光明表法現相別除如來十身相海品中九十七種相中所放光明亦除夜摩天等所放光明但且直論表法光明始終有十一一皆表因果次第不同餘教化佛放光或放多光或放一光或全身悉放而無次或放果光而無因或放因光而無果如法華經直放眉間毫相果光而無足輪下信位因光如大品經中佛放足輪下光直從下向上放光以成漸次從凡向聖多劫積修行滿之後方成果德不同此經放光從果成因以因成果因果一體不壞進修也第一先放齒間十種光明莊嚴法界一切道場為初登正覺十方告衆使令咸集此為莊嚴告衆雲集光第二放眉間果光入足輪中以果成因起信之首第三還從足輪下放出所入果光用照金色世界不動智佛以彼眉間果光入足輪中即是以果成因還以足輪下所入之果光復出照金色世界不動智佛即是用因成果因果頓示用成初信之門即以智首等十首菩薩用成信位第四又説十住品時升須彌頂上如來於足指端放光以明發足之始見道之初以三昧力住法之頂從前信位入真實證故十住位菩薩皆名為慧第五如來升夜摩天上放足趺上光以明用成行位此天離地際故説十行表依空起行用也明先證法身根本智慧始行萬行第六升兜率天宮品中如來膝上放光説十回向表此天處欲界之中理事無礙故名回向初發心住時理事無礙非獨此處方有回向但以次第名言法須安立然實體中一一位中皆具足也膝者明屈伸回旋自在故説回向義也表真俗自在故生死涅槃自在成智悲故也第七他化自在天中放眉間毫相果德光明為十地菩薩因果位終還像此天依他起化無自心化故表十地菩薩但為衆生所須教化自無業化又於欲界之際即無欲故還同四禪及出三界法門異彼小乘修生涅槃出三界惑故又異權教菩薩於第四禪中成十地故又從兜率天超過化樂天至他化自在天者表十地位法遍法界故不須次第上界四禪亦在其會不來而到不動而見上下諸天皆處其中十方世界悉在毛孔但以表法階降如是實無上下彼此往來十一地普賢佛華三昧會在第三禪天説來文未足第八如來普光明殿説如來出現品放眉間毫光灌文殊頂明前他化天上十地果終第三禪中等覺位畢設法已成陳施本教後方出現若未説法門何名出現耶又世主妙嚴品中始成正覺出現後出現品中自己稱法所見出現明從初始終於佛法界體上安諸地位次第之門於始於終長明出現本來一際無前無後放光灌文殊之頂以果光灌果法以文殊是佛法身根本智欲令文殊普賢菩薩共相問答文殊菩薩知而故問經云誰為佛長子我今當問誰於是如來放口中光灌普賢口第九如來口中放光灌普賢口口中光者是佛教光欲令普賢以差別智説佛出現果德法門文殊因佛放光始知問法之處夫聖智本自相知今以佛法印成用成後則此乃九度放光以成一部經之始終法則結會已前五位因果體用之門此之三人始終不相離故以明如來是文殊普賢二人之果第十復於給園之內更放眉間毫相果光明已上五位因果已成還將果法用利衆生故入法界品中令人天凡夫六千比丘五百優婆塞五百優婆夷五百童男女等皆令於此法門得道成佛從此已上十度放光表德圓滿具足其十不同化佛所放光明説一部經時或一度放光或即全身未曾有如此經中圓周始終一一成備德具其十也但言説十備德無盡十為圓數故也三問答所詮主伴別説此一部經之問答總相具德有三一佛二文殊三普賢佛表果德無言不可説不可修不可得不可證文殊成讚法身本智普賢成其差別智之行德一切諸佛皆依此二尊者以為師範而能成就大菩提之極果或説普賢為長子或説文殊為小男為最初證法身本智佛性為初生諸佛聖性智慧家故為啓蒙發明之首故為小男主東北方為艮卦艮為小男又為山為石在丑寅兩間表平旦創明暗相已無日光未著像啓蒙之首故指文殊師利在東北方清涼山也且取此閻浮之洲境位託法在於世間使令易解普賢長子位在東方卯位為震卦震為長男為頭為首為青龍為吉慶為春生為建法則之初表像日出咸照萬物悉皆明了堪施作務隨緣運用故普賢為行首為長男也觀音為悲首位在西方住金剛山之西阿説慈悲經酉為酉位酉為兌卦兌為金為白虎為凶危為秋煞故以慈悲觀音主之佛法無言以世間法託事表之有言説者皆是世間法也若也無言啓蒙何達以此義故用佛文殊普賢觀音三德互為主伴以成法則佛收一切果文殊收一切所行因果法身本智普賢收一切因果行身差別智以此義故或説文殊普賢為一切諸佛之師文殊為始見道初法身本智之門普賢即為始見道之後行行之門佛即二事之中無作體也化佛教中無此所表涅槃經中佛隱身不現大品經中薩陀波倫菩薩求般若波羅蜜門具六波羅蜜未有方便波羅蜜願力智等十波羅蜜但為引聲聞人天小器未堪聞方便願力智等波羅蜜也六波羅蜜中無方便波羅蜜者為方便波羅蜜行於非道彼小器不堪聞也何以然者有畏愛故及於彼經中多有聲聞人共佛為問答非大菩薩故設有菩薩非文殊普賢故設有文殊無普賢者表未具行故設有普賢無文殊者明不見法身本智慧故設有文殊普賢不自相問答明理事未徹故第四門示因圓果滿別顯佛果有三種不同一亡言絶行獨明法身無作果二從行積修行滿功成多劫始成果三創發心時十住初位體用隨緣所成果從行積修行滿多劫方明果者即權教之中不了無明十二有支本是法身智慧厭而以空觀折伏現行煩惱欣別淨門所有佛功德總是修生百劫修相好業燃燈得光明不殺得長壽布施得資財忍辱得端正一一因果屬對相似具足仍對治種種法門始得見性成佛如華嚴經即不然一念頓證法界法門身心性相本唯法體施為運用動寂任無作智即是佛也普門法界理智諸障自無無別對治別修別斷不見變化變與不變無異性相故普觀一切無非法門無非解脫但為自心強生繫著為多事故沉潛苦流故勞聖説種種差別於所説處復生繫著以此義故聖説不同或漸或圓應諸根器是故餘教先因後果不同此教因果同時為法性智海中因果不可得故可得因果即有前後有所得者皆是無常非究竟説也若先因後果者因亦不成故果亦壞也緣生之法不相續故即斷滅故自他不成故如數一錢不數後錢無後二者一亦不成為剎那不相續故剎那不成果亦壞多劫不相續多劫因果壞要待數後錢時前一始成因果亦爾要待一時中無間者因果始成若爾者如數兩錢同數無前無後誰為一二如竪二指誰為因果如二指等隨心數處為因後數為果若是有前有後即有中間者還有剎那間斷有間斷者不成因果若同時者如豎二指無前無後誰為因果亦皆不成如此華嚴經因果同時者俱無如是前後因果及同時情量繫著妄想有無俱不俱常無常等繫著因果但了法體非所施設非因果繫名為因果非情所立同時前後之妄想也五明地位所行行相別凡發大乘心者依其根品有六種所乘三種五位十地差別行相不同何者六種一念佛願生淨土門二作淨土觀行所生淨土門三修空無我所乘門四和會有無觀智門五漸見佛性進修門六頓證佛性圓融門何者三種五位十地一修假詮假智假真如等安立五地十地二修分真分證一分真如安立五位十地三頓修頓證頓真頓説佛境界圓滿真如安立十地五位行相此佛乘中無假法言説名相總真如是三種十地五位行相向菩提者行菩薩行者滿佛果者莫不總在其中一念佛力修戒發願力生於淨土是化佛淨土非真淨土為非見性及不了無明是一切如來根本智故是有為故如阿彌陀經是也二作淨土觀行所生淨土是化淨土從心想生故是有為故不見佛性本智慧故即無量壽觀經是也三修空無我觀所乘門者為初説般若破凡夫實有二乘生空我執故多修空法空有俱空為空增勝雖行六波羅蜜修種種菩提分法得六神通行菩薩行福勝人天不生佛家不見佛性為析法明空不了無明是如來智慧故是故如來於涅槃經中説一切衆生皆有佛性常樂我淨有諸菩薩自悔過言我於無量劫流轉生死只為無我之所惑亂有如此過故回心方可得見性達我是智四和會有無觀智門如深密經頌曰一切諸法皆無性無生無滅本來寂諸法自性恆涅槃誰有智者無密意此經為破般若修空增勝者言空言有互相破斥不令計有不令計無又此經雖安立十地於其十地位內復説有十一種粗重二十二種愚癡所以此經不安立地前三賢十信具足行門為此經地前非見道故又為第三時教中間但和會有無未是文殊普賢理事相攝行滿故何以然者為此十一地是佛位佛位之內猶有障故明十一地已前未有真理本智故若全真理智云何十一地有十一粗重既有粗重即非地地中有佛智如是等教並對權根假施設有但化佛所説皆是引中下根人未盡實説也如華嚴經但於地前三賢初發心住中即能頓證佛果法門普印諸位十住十行十回向十地等覺諸位如印印時文相具足無前後際即以初發心時頓印三界無明便為佛智之海以如來法身智身大慈悲之印一下頓印世間以為法界大用五漸見佛性進修門涅槃經云十住菩薩少分見性乃至十地未能了了起信論云十住菩薩少分得見法身化八相成道故如彼論釋言是願力所為既是願力非為實報總為漸見佛性從初發心住已後所證佛果不定僧祇何以故如涅槃經紀屠兒廣額於賢劫中成佛闡提創發心尚有越劫之功何況具足信根復能少分見性者何有僧祇之哉世有諸德解屠兒廣額是化作爾者此乃曲逐人情未詳佛意者也漸漸引權向實豈令見劫存情令違本耶漸漸引至龍女善財一念之中得成佛者始成實説三乘小見但念長時時體本無空嗟欣仰無繩自縛何有休期前略説三種十地又以經義校量有六種十地三乘權教中有三種十地實教中亦有三種十地如仁王經解深密大品經此三部經中所説十地多立假真如門以成十地行相此是權教中三種十地如涅槃經中十住菩薩少分見性十地菩薩見性未能了了即明以佛性為所乘門分修分證十地又涅槃經中牛食雪山肥膩草純得醍醐等即明證佛位故即為五種十地如華嚴經所説法界門重玄無盡法以成十地是為六種十地如起信論中十住菩薩少分見性以誓願力能八相成佛雖未圓滿為見少分性力故勢力如是猶如儲君為有因緣父王令其統紹君政為是王真子故力堪如是故為少見性故為如來真子生佛家故不同餘教假真如假智等待於初地方生佛家明見性力真勝餘宗少分如是何況全得乎六明頓證佛性理智萬行圓融門如華嚴經十信位中菩薩皆從十智佛所來者為十信位中以果成信故為明信從果來以果為因故若不以果為信即無所信故信無所依何故文殊師利為上首為文殊為果前之信普賢明是差別智為果後之行文殊小男者為初生故因初證本智法身能生佛家故普賢為長子者為依根本智起行行差別智治佛家法諸波羅蜜事自在故又文殊乘師子者為明創證法身佛性根本智斷惑之駿故普賢乘香象王者表行庠序為威德故又文殊常居東方金色世界不動智佛所者為明金為白色能離垢故普賢菩薩常居東方寶威德上王佛所者明萬行為寶以此行故成其威德若具行者以法寶身自在也威德無畏自在為王若不具行者皆有所畏設居高位不得為王為有所畏故是故子為佛位丑為信位寅為十住卯為十行辰為十回向巳為十地午為等覺未為晦明入俗同俗化迷申酉戌亥為所化故如是安立法則法合如是故是故如來治坎而發明普賢為智相主萬行觀音為大悲之首治凶危為上將文殊為覺蒙之首常為接信之師互體交參以持佛家之法皆令衆生住於中道處恬和之性智慈益物以是身皆金色目髮紺青體白而相黃為應真和氣也皆為無形之形無色之色經云一切處普賢菩薩一切處金色世界一切處文殊師利一切處不動智佛經云佛身充滿於法界普現一切衆生前應受化器悉充滿佛故處此菩提樹一切佛剎微塵等爾所佛坐一毛孔皆有無量菩薩衆各為具説普賢行又問十首菩薩等業不知心心不知業等十問令起信者自身觀照轉令深固經云諸法無作用亦無有體性是故彼一切各各不相知又作水流火𦦨風起大地所生不相知喻又下頌曰分別觀內身此中誰是我若能如是解彼達我有無又賢首品中從凡夫位以信為首決定取佛大菩提果故從凡夫地信十方諸佛心不動智與自心無異智故只為無明所迷故無明與十方諸佛心本來無二故從凡夫地信十方諸佛身根本智與自身無異故何以故皆是一法性身一根本智猶如樹枝一根生多枝葉等以因緣故一樹枝上成壞不同故從凡夫地信如來十住十行十回向十地我悉盡能行之何以故自憶無始時來波流苦海無益之事尚以行之何況如今有益之事菩薩萬行濟衆生事豈不能為是故從凡夫地信佛智慧我亦當得何以故一切諸佛悉從凡夫來故如來藏身即法身也諸福智海莫不居中故稱為藏若不見法身一切福智大慈大悲悉皆不辦總屬生滅普賢行文殊師利法身根本無相智二人齊體互為主伴中間無作智即為佛果三人體一寄安五位用接凡迷若有凡夫信滿發心十住之初三身同得文殊是佛法身普賢是佛行身無作之智果是佛報身常以文殊法身無相妙慧以為先導説時先後證即三身一時法合如是廢一不可若廢文殊存普賢所有行門屬有漏若廢普賢存文殘所證寂定是二乘若廢佛存普賢文殊佛是覺義無覺者故以是義故三人不可廢一若廢一三不成故是故三乘權教中無此三人始終不相去離以教門未實總皆化身權逐小根且略權施待其熟故方遷就實如此經中十住初位即是十行十回向十地等覺位一位中得五十法門以互相徹故乃至無盡諸位等進修行相層級不廢漸漸而是一時不廢一時中漸漸位中有三十七箇菩薩同名為藏者為明此十地法門果終意欲辨知正道助道故故立三十七菩薩成三十七助道法門明十住已來菩薩所行皆是助道非是五位無住無行任真自體名之為正果故若以初發心住以法性無相根本智不離無作用之體行諸萬行菩薩與佛因果本來體齊若簡佛果無作無修菩薩正加行已來總名助道以動寂無礙正助元來不異一法門也六重令善財證法別經中但有法門未有人求學者故令善財詢友一一以行行之一如前經之法則令使後學無滯彌勒令善財却見文殊明從法身理體根本智為因見彌勒菩薩是善財乘法身本智為果及諸善知識所行普賢行以成自己佛果見彌勒之後入普門法界自見其身入普賢身者雖成正覺常以普賢行利益衆生即明文殊普賢彌勒佛果三人始終一處表通因徹果此三人之道是古佛之大都源始之法際若迷解者即本來全得處迷者自沒輪回為古佛道法本來常如是故非生滅法無作無為也七明六位菩薩來衆別如權教之內所説菩薩諸地位次但説假真如為因果仍地前三賢未能正證初地之中一地證一真如十地證十真如證十真如之後方能始見佛性前證真如復言有十真如障真如既能成障明知權教之中即施設假真如非本真也所設地位三乘同聞聲聞人天共會此經不爾總是果位菩薩文殊師利即是能證之因不動智佛即是所證之果今舉此因果同體無二用成十信之初門還令諸信者信果成因還修果法以成因位十住初心之上便成正覺為從證果本智為因也是故此經下云以少方便疾得菩提不同權教菩提同有為故立能證所證也一念之間無有能所能所盡處名為正覺亦不同小乘滅能所也了能所本無動故所有一切衆海菩薩天龍諸神等衆皆佛果位海諸菩薩衆非是凡夫欲令入者即同聖故明毗盧遮那攝化境界等衆生遍故故初發心時便成正覺於一剎那際皆得此法不許於剎那際外有別時得者即非本法故若有人於佛法中見佛成道作劫量延促處所而生見者信亦未成八明所施法門理事別如化佛權教中説有情有佛性無情無佛性一切草木不能成道轉法輪等如華嚴經即是越情實教如功德林菩薩等十林菩薩所從來國國亦名慧一切境界總名慧體何以然者無有情無無情故所以然者無二見故為一真智境界無成佛者無不成者故夫有情無情者此是依業説夫論成佛者非屬業故如經所説是諸法空相不生不滅不垢不淨世間相常住是法住法位如是之道為有情及非情邪若存情計者見有情成佛見無情不成佛此為自身業執如是解者終不成佛此由未見法空不依實慧未了得世間諸相本來常住但見隨情識變生滅之相九明與諸三乘得果別如經所説為聲聞人説四諦法生老病死為緣覺人説十二緣行為諸菩薩説應六波羅蜜今此華嚴經亦説四諦法即與聲聞四諦法不同如四諦品中明苦集本真元來是根本智不同三乘有欣厭故聲聞觀苦集二諦深生厭離作無常不淨白骨微塵等觀知身空寂隨空寂法智滅身亡不生悲智名之為滅以此滅處名為涅槃滅伏諸苦名為滅諦以此滅諦名為道諦緣覺之流知十二緣生之法本來無實自體皆空知身知心自皆無主身心無主性恆無我以無我故無明便滅無明滅十二緣滅逍遙任性獨覺自居異聲聞故不趣於寂異菩薩故無有悲智惟不趣寂故即勝聲聞惟能持法故即不如聲聞以聲聞之人聞佛所説大乘經典亦能宣傳但未親證權教菩薩創回二乘及小菩薩未能全具大悲智但説六波羅蜜引起小根令成智慧以彼偏修定業滯在無智猶怖生死未説七八九十波羅蜜等九地已來未明佛性為修彼假智乃成障故如此經為上上根人頓示本智初心創發十住位上即與佛同以依本智法即無所修故本無障故任運悲智不作而成隨緣六道無非法界了緣生法自體恆真更無修作所有念慮皆從智生但知任運對現色身説法應機如響相對恆處生死流法身常寂雖經多劫體不移時入死出生非沒生也任大悲智不住證修法如是故龍女善財總明如是此法難信三乘拱手遙推是化非是人修直説僧祇逐情立劫焉能信此無時智門設經多劫勤苦作修有得有求作長作短作是作非作成作壞捨身壞命豈有成佛之期何如初心即須如是入佛智境豈不省力以此義故聲聞緣覺權教菩薩不真解四諦十二緣及真如法身實智境界皆是毗盧遮那方便引修向此華嚴真實之海令歸本法任智施為所修諸地隨智所作不起能心而皆成辦一切種智不似諸教地上別作對治十明所付法藏流通別如來出現品中説佛子此法門如來不為餘衆生説唯為趣向大乘菩薩者説唯為乘不思議乘菩薩説此經法門不入一切餘衆生手佛子譬如轉輪聖王所有七寶因此寶故顯示輪王此寶不入餘衆生手唯除第一夫人所生太子具足成就聖王相者佛子此經珍寶亦復如是不入一切餘衆生手唯除如來法王真子生如來家種如來相諸善根者不同權教付囑三乘聲聞菩薩所共流通又三乘之教多付囑諸聖及未生佛家諸凡夫此經付囑最上大心凡夫唯求如來不思議乘生佛家者何故三乘之教多付囑諸聖者令使流通及付囑未生佛家諸凡夫等為三乘之法未出情塵明法未真易信解故且令凡聖共讚令教流行善根不斷不似此十信之終剎那即佛以此義故三乘之教且漸引生未出情塵三僧祇劫方得作佛順情之教根易信故凡聖共讚皆得流通不同華嚴十方諸佛根本智法及差別智大慈大悲法出情塵教深難信要待入證十住之位生在佛家為佛真子方是流通但有聖説無入證者不名流通但有凡夫説教無入證者亦不名流通為自法不明疑情猶在不破自他暗故未能決定知佛意故以此義故付囑大心凡夫入證者第四明成佛同別夫智身廖廓總萬象以成軀萬象無形與智身而齊體違真相隔得本形同只為乖本相殊致使化儀各別略作十門成道差別使童蒙起信發解除疑識本離權情希勝德十門者一成佛身別此毗盧遮那佛身如經所説有九十七種相及無盡相身非三十二相八十種好身二成佛時別權教中佛生之後逾城出家菩提樹下成等正覺以之為時如毗盧遮那佛即不如是又云如來安立化相為度三乘衆生應見如是出家成佛如華嚴經中實法界海即不如是法華經云吾從成佛已來經無量阿僧祇劫此即是回彼三乘人就實而論此毗盧遮那佛依本法界成大菩提還依本法界無有時分經云如來不出世亦無有涅槃此為實説又頂著華冠本非出家都無八相之事若有人能知如來不出不沒不成不壞即知如來常住在世常轉法輪即是毗盧遮那出興於世又從兜率天下降神入母胎轉法輪入涅槃不出一剎那際彼天猶未下母胎猶未出此已入涅槃一切法事總畢三菩提樹別三乘之中見佛道樹是木樹高下稱人間如一乘中如來成道所居之樹即寶樹高顯殊特四所坐座別三乘中化身成道棄榮貴藉草蓐此一乘中本身成道坐寶蓮華師子之座妙寶嚴飾具衆莊嚴五大衆別毗盧遮那佛所有大衆圍繞皆是普賢文殊等及有新發意者皆是志求佛果法界之衆皆智圓多劫一際無前後時之衆六示相別如權教中即以兜率天受生降神入胎八相成道等或於摩醯首羅天坐華王之寶座或以三千大千之國土以為報境如是施設分量限劑皆引衆生之化儀漸令心廣未為究竟實相如此華嚴法界妙門約分十佛剎塵蓮華藏剎海參映重重明無盡佛國互相徹入一一佛剎皆滿十方十佛剎塵國土皆無限礙身土相稱都無此彼往來之相如此盧舍那相海纖塵匪隔於十方毛孔詎虧於剎海三乘示相螢光不可以比日月之照琉璃難以類摩尼之淨此乃非由佛爾只為器劣故然七轉法輪別化佛轉三乘法輪毗盧遮那轉一乘法輪三乘教説説龍女剎那成佛是化返成謗教不順佛心元佛本意令龍女剎那成佛為本法法自無時證盡時處即為實法返云是化此是苦哉當復奈何不期甘露返成毒藥翻將寶玉喚作泥塵以實為虗將虗為實請後達士莫踵前賢深可久思具間佛意依宗傳教福利人天使得金玉煥然各不沉沒是故化佛説三乘即龍女剎那成佛雪山肥膩草喻若牛食者純得醍醐等皆為分有未具全示一一具足因果報相之門唯此華嚴具足是故今言轉法輪別八轉法輪處別權教中化佛轉法輪或言鹿園或言給獨孤園等皆有處所上下往來此經即十處十會及一切塵中佛國佛身重重重重重重無盡無盡無盡常轉法輪不去不來不出不沒皆云不離菩提場而升一切處九大會莊嚴別説此經時天上人中十會十處一時普集十方聖衆大心衆生又十會之衆各從十方來隨所來方皆云有十佛剎微塵衆而來集會位位地地以次十百千增多為明無盡又一一會衆皆遍法界重重重重參光影像纖塵之內亦衆會重重一一塵中衆會皆與法界虗空等如是衆會皆為諸佛菩薩性遍一切處身土衆會皆遍一切處故不似三乘中化佛衆會皆有處所限量分劑往來為衆生根小非佛故然十所授法門別如權教中或從小乘修四諦觀於中苦集二諦以為世諦滅道二諦以為真諦觀彼苦集真實是苦深生厭離趣求寂滅故苦集本無識滅智亡以空為證且令苦盡然後方為説大乘法令使回心修法空觀行諸六度漸起悲智或有大乘菩薩種性者觀行對治以彼小乘性有慈悲樂行諸度不取空證留惑益生成法空等觀或有大乘菩薩種性一下頓修假真如等觀以假真如門加行調伏經三僧祇劫十地見性方始成佛如此華嚴經即不爾直為上上根人一下直授法界自體根本法身古佛智海迷在無明頓令以方便三昧而令現之全將佛果頓授十住初心一念一時一際一法界門頓收第五明見佛差別夫佛身性相一體無差器有萬端依根各異情存想隔見絶體齊身立影生情留佛異佛由情應以此乖真心盡情亡智身自稱隨緣無作動寂俱真如是相應名毗盧遮那佛略立十門見佛差別使留心創信者返末而還源也一人中見佛但有三十二相二諸天見佛但有八十種好三諸龍見佛或同人所見或見但為大龍王餘畜例然四諸仙人見佛但見仙人五諸餘外道還見佛與己同類六八部神等見佛與己為王七小乘人見佛為大聲聞八緣覺人見佛見還為緣覺九權教中菩薩見佛但為三千大千世界之主福智充遍三千大千世界十一乘教中菩薩見佛為十佛剎塵蓮華藏世界海為法界主此十種見佛不同皆由發心之時信樂差別以信樂力故見佛不同是故當知發心者當發廣大心信廣大教門發廣大願行廣大行入廣大智利益成就無盡衆生即得速成菩提行願福智悉皆圓滿若不如是終非畢竟成大菩提第六明説教時分夫創正覺心道源虗寂智圓三世始終俱盡會萬象齊有無混去來印今古豁達唯神恬薄應真情亡智立想絶悲存圓聲遐布隨根受益一雨普滋百卉齊得如空谷響稱擊成音諸機獲益任智無心略依權實且立十種教起前後時分不同一如力士經説佛初成道一七日思惟已即於鹿園説法二如大品經説佛初鹿苑轉四諦法輪無量衆生發聲聞心乃至獨覺心大菩提心等三如法華經説三七日詣鹿園説法四如四分律及薩婆多論六七日方説法五如興起行經及出曜經七七日方説法六如五分律八七日方説法七如大智論五七日方説法八如十二遊經一年不説法九依今唐朝藏法師判如來成道定經三七日後方説華嚴經十通玄今依此華嚴經法界門總不依如上所説如此經以法界本智性自體用理事大悲本實為宗不依情量時分之説古今見盡常轉法輪無始無終法本如是如上所説總依根自見時分並非如來有此不同如來本法智體並無時分可立但令心信解法界無時即是如來説法時也情亡心盡任智利人即是如來成佛轉法輪時也若也情存立見云如來如是時出世如是時説法者並不依佛見總是自情此經乃是無時之時一切時説如法華經云吾從成佛已來經無量阿僧祇劫量既本無知欲將何為説法時也皆是如來一智用一圓音一剎那時以無時之時為説法時也第七明淨土權實夫以滔滔智海茫茫莫究其涯渺渺真源蕩蕩罕尋其際遮那法界體相括於塵沙方廣靈門淨穢互參於無極但隨自修業用見境不同致使聖説乖違依根不定或權分淨土於他國指穢境於娑婆或此處為化儀示下方為實報文殊住居東國金色世界而來觀音身處西方安樂妙土而至如是權儀各別啓蒙的信無依今略會諸門約申十種以定指南一阿彌陀淨土此為一分取相凡夫未信法空實理以專憶念念相不移以專誠故其心分淨得生淨土是權未實二無量壽觀經淨土為一分未信法空實理衆生樂妙色相者令使以其心想想彼色像想成就故而生佛國此權非實三維摩經淨土者佛以足指按地加其神力暫現還無是實報土未具陳廣狹是實未廣四梵網經淨土雖説一大華王而有千華一一華上有百億化佛教化百億四天下衆生然彼千華及彼華王為三乘菩薩見未廣故分示報境未成圓滿是權未實五摩醯首羅天淨土如來於彼坐寶蓮華座成等正覺以為實報此閻浮提摩竭提國菩提場中成正覺者是化此為三乘中權教菩薩染淨未亡者説言此閻浮提及六天等是欲界有漏彼上界摩醯首羅天是無漏故心存染淨彼此未亡此為權教未為實説六涅槃經所指淨土云如來有實報淨土在西方過三十二恆河沙佛土外者為三乘權教一分染淨未亡者言此三千大千世界總是穢土權推如來報境淨土在西方此權非實七法華經三變淨土此為三乘權教菩薩染淨未亡者言移諸人天置於他土是權非實八靈山會所指淨土此引三乘中權教菩薩染淨未亡者令知此土即穢恆淨諸衆信可未能自見是實非權信而未見九唯心淨土自證自心當體無心性唯真智是實淨土是故維摩經云隨其心淨即佛土淨欲得淨土當淨其心十毗盧遮那所居淨土即居十佛剎塵蓮華佛國土淨穢總含無穢無淨無有上下彼此自他之相一一佛土皆充法界無相障隔略言十佛剎塵國土為知無盡佛國不出一塵為無大小故不立限量故以法為界不限邊際相海純雜色像重重此為實報非是權收第八明攝化境界夫佛境無邊順機各異隨情廣狹見有差殊非是如來分其量數情微即境狹量廣即境寬若也智契真源佛境彌綸法界或見閻浮為化境或見四洲以濟生或見形滿大千或見報身十海如是種種設教不同發蒙始學憑準何依略示五門識其權實使得捨條從本速證菩提一人中見佛境界但見化一閻浮提衆生二諸天見佛但應自見境如帝釋即是二地菩薩位乃至漸升至梵天王是十地菩薩位也或以暫時佛神通力成就衆生令人天中凡夫及二乘并小菩薩總得見佛報土境界即如維摩經佛以足指按地所現淨土是也或時以佛神力令人天總得相見即如大集經中所説寶坊之上處欲界上色界下大集人天之衆總在其中三二乘中羅漢見佛攝化境界如大羅漢以天眼力得見佛攝化三千大千境界即如阿那律云我以天眼見釋迦牟尼佛土三千大千世界如觀掌中菴摩勒果如小羅漢即不定或見佛攝化一閻浮提此即以久伏忍力能斷結使未有定力亦未有神力通變等事四權教菩薩見佛攝化境界初地百佛二地千佛三地萬佛以此漸增如三乘大乘教説五實教菩薩見佛攝化境界初地菩薩即見多百佛即是無盡之百不是一百之百二地菩薩即見多千佛等即是無盡之千三地菩薩即云多千萬等以實之説諸地菩薩皆悉齊見如帝網等三賢菩薩亦然非但十佛剎塵蓮華藏為其報境法界虗空總皆平等為十住初心初見道時即已無大小見故即總見佛化境皆如法界初地見多百佛境即明滿義非如三乘單百此多百者即齊無盡之數故第九明因果延促夫法界圓寂無始無終理智虗空非因非果但為有情存量假寄其名情亡量絶何名能立名不自施本由量起量亡情盡名亦自真今以無名之真名談無果之真果以無説之真説談無因之真因啓蒙之士不可以滯其名始學之流不可以廢其説滯名則名立廢説則言亡當可任性隨緣起為法起若無緣者滅唯法滅有此法者性不自知今談因果延促如空中鳥迹如石女之子但為衆生情有愚智隨心照惑遲速不同劈竹登梯稱機各別因慈之類延促不同非謂日月與作時分教不自施因機故起教隨根應有根教生今以依根約立十門一小乘善來得阿羅漢果二小乘一生得阿羅漢果三小乘三生得阿羅漢果四小乘六十劫得阿羅漢果五緣覺四生得緣覺果六緣覺遲經百劫得緣覺果七依權教菩薩成佛定經三僧祇劫得成佛八依法華經實教會三歸一令龍女一剎那成佛破彼三乘經於多劫方始成佛九華嚴經説兜率天子三生得十地果十善財童子一生成佛如上所説皆是三乘及一乘聖教依根約器所説如龍女破三乘之定劫成剎那之實門涅槃經屠兒廣額授賢劫中成佛之記破闡提之無性兜率天子明一乘教殊勝之力聞之生信為不修故設入地獄亦能成種蒙光觸身來生兜率天上登十地位舉此一事意合信此諸佛所乘以難信故信即必定成種為信解內薰必至成佛如善財童子一生成佛者明於十住初心一剎那際情亡想盡三世一念更無所生名為一生不取存情立劫時分之生如是無生便成佛果如本生故名為一生還同龍女一剎那際情盡時亡名之為佛第十明會教始終夫慧日世尊稱法界而遍照智周萬有與凡聖而同真理事互融體用相入即四十品之勝典終始交羅百萬頌之妙言前後參映十處十會如帝網之重重十剎十身若鏡像之相入舉一門衆門俱發談一品諸品齊麾道樹始成九天同屆普光一集十處咸登今古無差舊新一念不離一位便分五位之門一行之中乃建塵沙行海法界體上安立訓俗之詮果德性齊施設引生之教文殊以贊明法體普賢為成備行修二人悲智參光使得雲滋寶澤法界品內復令善財重修倣此一部之經一一行其行相菩薩接生之軌各各次第分明今分十法以約紀綱一明毗盧遮那始成正覺即世主妙嚴一品經是言始成正覺者以自身心證盡三世古今等法在一念中無久近相於一念中而亦不壞衆生三世久近劫智及種種衆生差別知見智如是上下前後四十品經總於始成正覺時一剎那際以法界海智印三昧門一時頓印身色言音説諸佛法及一切塵中諸國剎海普宣流布及入涅槃不移一時一際一性前佛後佛總在一時隨諸衆生現差別法古今相徹名之為始契法如是名之為成依法如是非心造作名之為正智達斯理名之為覺於一念之內現三世事者為衆生故非於本法而有三世二明示果勸修即如來現相品普賢三昧品世界成就品華藏世界品毗盧遮那品如是五品經是也於現相品如來口中衆齒之間放光以光中音聲十方告衆使令咸集普賢菩薩為佛長子治佛家法入佛三昧舉佛果德令衆敬愛起信樂修三明信心成備即第二會中如來名號品四聖諦品光明覺品菩薩問明品淨行品賢首品此六品經於普光明殿中説以普光明殿是佛智用果滿報居之本宅還從中説信位法門為明説果成信既信果德從茲已後至十地十一地佛華品已來方明入道進修五位成滿從因至果不隔時故皆以根本不動智等十箇佛以為所信之門四明入真實證從第三會升須彌山頂上於如來兩足指端放光明於中説六品經是一升須彌山頂品二須彌頂上偈讚品三十住品四梵行品五初發心功德品六明法品此六品經明創證法門住佛所住生在佛家同佛智性功德解行理智如佛初發心時便成正覺升須彌山頂者明從前信心今升十住法王山頂至法之際智照無礙如上高山至相盡處故從茲已去任法無功始終俱佛不從八地方具無功瓔珞經云三賢菩薩法流水中任運至佛初水後水一性水者因佛果佛一性佛故於其中間無初中後不隔念故依本法故無念可隔因果便終一念相應一念佛故不論相好及與神通相好神通從此正覺中得若證正覺即不著諸相五發行修行從第四會升夜摩天上於如來兩足趺上放光説四品經一升夜摩天宮品二夜摩天宮偈讚品三十行品四十無盡藏品此位從如來兩足上放光及升夜摩天上説者為明從須彌山頂至相盡際證佛智身至夜摩天下依法空本智起普賢萬行以處表法令易解故如彼諸天離地際故此天依空而住為明十行依本智法空而行故六明理事相入從第五會升兜率天宮於如來膝上放光説十回向回向者令諸事法皆入理故以十行事法入前十住中理事無礙故名回向前十住即是文殊法身本智後十行即是普賢萬行明二人體用相徹名為回向膝上放光者明理事卷舒自在猶如人膝屈伸回旋皆由於膝七明蘊修成德從第六會升他化自在天宮如來眉間放光明此光與初會中如來眉間所放光明終而復始至本處故説十地一品經是也何故無升他化天宮品無偈讚品為明十地果終住法本宮恆遍一切功終行極更無升進十地智滿無進修故常對諸佛現在前故為非新來無稱歎故此十地門但於十住十行十回向中蘊積功成使令淳熟更無所住任運而成自令具足一切諸法八隨緣無礙於第七會第三禪天集八禪衆説一生補處菩薩入佛華三昧定説十一地等覺位中行普賢行遍明入俗遍周法界名為等覺位中普賢行也言佛華三昧者佛者覺也明十地成佛已終次十一地覺行滿也九明因果位終從十定品十通品十忍品阿僧祇品壽量品諸菩薩住處品不思議法品如來十身相海品如來隨好光明功德品普賢行品如來出現品離世間品已上十二品經是也何以然者為十定品至離世間品總該五位十地佛位及普賢萬行始終因果門前後徹故十明令凡實證從第八會在祇園之中如來入師子頻伸三昧門還舉法界果德現諸世間令生信樂達佛實相五百聲聞目連鶖子示同不聞寄同二乘有信不信會中六千比丘明是凡夫於文殊師利所頓明十耳十眼乃至第九會覺城東一萬龍衆五百優婆塞五百優婆夷五百童子五百童女並是凡夫同證佛位無量諸龍得生人趣一萬諸龍發菩提心覺城五衆俱登佛果五百者表五位六千者表六位一萬龍者表萬行之門無有一事浪施設故過去諸佛大塔廟處為其會者明古佛今佛道迹不殊還同如來會內如是法界佛果法門諸有信解及初發心證入之者猶如師子王之子初生之時雖則未能如其師子王力勢自在然師子相全體無異一切諸獸皆當畏之如於此華嚴經佛果法門初證入者亦復如是能信自己身心性相全體佛果自體恆真本無修造以此真門成備進修差別萬行一真果德雖未能堪力用如佛是則名為種佛種子是則名為生在佛家為佛真子便即超彼三乘見一切三乘人天外道智所不及
