body:
  text: 唐滄州長者李通玄合論明溫陵長者李贄簡要明吳興後學董廣𥌓閲正升須彌山頂品此第三會此十住中有六品經一升須彌頂品二頂上偈贊品三十住品四梵行品五發心功德品六明法品如是六品共成十住法門須彌頂上偈讚品此品名為偈讚品明古今諸佛同會此智殿悲宮自身是未來之佛與古佛道合故云從百佛剎微塵數國土外諸世界中來者迷云國土之外迷解云來但以迷無明暗障廣多比之世界塵數悟之解行廣多亦比之如世界之塵智慧與無明相似但只隔迷悟故故此十住入真見道初心與後十行十回向十地十一地為正覺之果如人百歲以初生為長故人生十子初生為長十住品十住者生諸佛大智慧中住入此位永不退還故名之為住雖十種對治不同三乘權教約劣解衆生存世間三世之性說佛果在三僧祇之外如龍女剎那成佛善財一生取佛果法界無性無生為一生非延促生故為法界體無情量延促長短去來今故諸有信者應如是知如今成佛與過去未來一切諸佛一時成佛以法界智體無別時故如一滴之水入大海中便同大海無新舊水故故去情方見非識心知如三乘中十住菩薩猶受三界分段生死分學生空觀對治闡提不信障又如三乘中地前三賢菩薩得伏忍十地與佛地得寂滅忍又望勝鬘經羅漢辟支佛淨土菩薩總是伏忍以不識無明住地煩惱故猶不識云何名斷煩惱但伏現行不起得三種意生身受三界外變易生死如是菩薩為行六波羅蜜得六神通福德神通並勝人天唯非修佛果法界門故是門外三車草菴三種意生身者一二三地名三摩跋提樂法意生身四五六地名覺法自性意生身七八九十地名種類俱生無行作意生身如此一乘教都無如上三乘之趣以為根本無明住地煩惱便為一切諸佛不動智一切衆生皆自有之只為智體無性無依不能自了會緣方了云何會緣會緣有三種一會苦緣遇苦方能發心二會樂緣久處人天內心明慧達世樂果無常方始求真三見佛及一乘菩薩而能發心求佛種智以會三緣近正善知友而能自覺無明本是佛智也三乘同然只為意樂淺深各別因本智而生信約本智而悟入不離本智故於初發心住即五位齊周雖列十住十行十回向十地十一地行位法門進修軌度如王寶印一印無差以一心大智之印印無始三世總在一時無邊諸法智印咸遍以智等諸佛故以智等衆生心故以智等諸法故以智無中邊表裏三世長短近遠故為智過虗空量故如世虗空無所了知如無分別智虗空一念而能分別過虗空等法門是故經言一切虗空猶可量諸佛說法不可量以是發心之初住佛種智家才發心時即於十方現身成佛文殊師利菩薩頌云一念普觀無量劫無去無來亦無住如是了知三世事超諸方便成十力明知三乘三祇出世成佛是權方便教此教約實法不說以願力成佛等事設以願力成行還以約實成佛不說以願力暫成故是故起信進修行者於大智境界莫作三世近遠延促之見違智境界故失本大智之境逐情識故隨相轉故如此五位斷惑次第如空無時如圓鏡頓照如摩尼寶能同衆色如一滴之水入大海中等同無二以大智慧之圓鏡普印諸作莫不皆成無作用之大用故無三世之一時故無量方便三昧者明情識昧正智自明如色界無色界三昧皆以息想慮而得之聲聞緣覺三昧修厭患觀而對治樂觀空而滅悲智權教菩薩樂觀空而行六度離苦本而生淨國設有住此界者言留惑而化衆生皆非法爾合然以此義故此方便三昧為一切衆生迷法界體用便將根本定體淨所妄情名為方便非是別於真外別有假安立之定名為方便也譬如水清寶能清濁水為珠淨緣現本淨水非是珠能作得淨水方便三昧亦復如是為以萬法無作本自淨緣現得本自無作智慧力故故名方便若天人外道三乘所有因果皆有所作以此所生皆有處所皆有果報廣狹淨穢差別等事於此佛華嚴一乘法門無住無作所有其生任無依智無依止心智幻生身稱真法界於一切衆生前對現色身其體相無來無去亦不作神通變化之事雖然普現三世一切業果在剎那之中然亦不住三世遠近及剎那之見所作三昧智慧一切願行總是任理智之運為非有作有修欣厭之法也十行之中云萬佛剎微塵十回向位中云百萬佛剎微塵為對迷時即不可說剎塵煩惱對悟時即不可說剎塵佛國及佛智慧也梵行品梵者淨也以其淨行利衆生故常居世間行一切行化利衆生無行可得則無行不淨是故名為梵行也住佛無所住之門故還行無行之行無住之住名為佛住無行之行利益無衆生之衆生名為淨行夫佛智非深只為迷心逐相情虧也智隱一體也智現以不思不惟而知衆法將不造不作而辦大功以此如來設淨行之教觀法盡也正法當興諸見亡也佛智方起見亡智應不由他悟是故後學之士應法修行不可以逐境沉淪迷流永劫但如上所說之經多少自然恰中故諸行淨則智慧淨智慧淨則其心淨其心淨則諸法淨諸法淨名法界淨法界淨即衆生淨衆生淨則佛國土淨行此法平等者名為淨行也初發心功德品夫以初發心之士功德難量舉等虗空無以比其類磨盡剎塵無以酬其匹虗空但明無相之大一切剎塵但明形礙之廣焉能對菩提心福智之境哉其智也於剎那之際滿十方現身如雲狀因陀羅網妙像相入光影重重各各以一言音普周法界說等衆生教門如雨灑衆生心得清涼樂爾其福也妙相莊嚴與華嚴而同其體為初發心之際與十方諸佛等住無盡劫海入諸佛大智慧流中等佛功德一切衆生總須悟如此法方得成佛不可取如來三乘中順世方便之言明法品此明前所得法使令更明後之升進使令明白是修十行之向長養本位十住之法精進慧菩薩者慧者照燭義精進者無思義以無思之慧照燭有作之功有作本自無功萬法本來自淨萬法自淨名之為精無功智應知根利生名之為進經中入深禪定得佛神通者以心稱理任理自真不生不伏理真智應隨以智應而化羣品無來往亦無變化名佛神通智無依止無形色體無來去性性自遍周非三世攝而能普應三世之法名曰神通是故經云智入三世而無來往為三世是衆生情所妄安非實有故為智體無形色不造作而應羣品名之為神圓滿十方無法不知無根不識名之為通升夜摩天宮品此第四會何故名夜摩天宮明以處表法此天名為時分天為此天無日月晦明以蓮華開為晝合為夜故名時分天為表十行法門知時而應物化不可不知時故知是人天種二乘三乘一乘種知可以何善根而接引之故以時分天表所行之行須知時故夜摩天宮偈讚品十住之中以法身為戒體此十行之中以智慧為戒體仰視虗空隨所須物惠利衆生皆從空下者明智如空空為智本智不異空故是故空者衆法之本以此觀之一切功德總從空智而有十行品此天光自相照及無有日月但看蓮華開合而辨晝夜名為時分天如此位菩薩知衆生心欲開發時應時引接未應度者與作得度因緣故於此處說十種行門前之兩品已明至此而稱歎也舉萬佛剎微塵數佛皆號功德林者明若迷其心境無明與無限剎塵不殊若了達心源智慧功德等十方而無盡十無盡藏品此位已說十種行以此十無盡藏成後十回向之法使令進向令使行門不滯升兜率天宮品此第五會此品大悲門初發心時以真智慧進修而悲有勝劣不同十住十行智慧兼修仍出世心多此位大悲出世心終回十生死智慈之悲十地之中長養大悲更令深厚問云何於此天處說回向法答曰如須彌頂上說十住明初生佛家任佛智慧之頂而無退動夜摩天上說十行表行依法空一切無著至此兜率天宮表雖不離欲界處大悲門而於欲境常行知足無所染著但為饒益衆生處於世間故名回向此為以處表法升進亦即不曾身有上下去來但明寄處表一生菩薩處此天中果行滿故以明發心初始生如來智慧之家以佛智慧行大悲門即是圓滿如來果故果復常滿行復常行果行相嚴故號佛華嚴也經云善知其時為衆說法者了根生熟如應化度問曰何為諸佛知衆生心時與非時答曰諸佛如來心與一切衆生心本不異故諸佛悟而了與衆生共之衆生迷自謂為隔一切諸佛以一切衆生心智慧而成正覺一切衆生迷諸佛智慧而作衆生及至成佛時還成衆生迷理之佛所說法門還解衆生心裏迷佛衆生以此不異故知衆生心如是大悲如是智慧如是萬行但為長初生佛家之智慧大悲令慣集自在故時亦不改法亦不異智亦不遷猶如竹葦依舊而成初生與終無有粗細亦如小兒長初生而為大無異大也直以十行十回向十地十一地為長養道之方便故佛果在於初發心十住十行十回向十地總十住中總具足也猶如神龍馬王所生神駒生在其地與父遲速相似唯力用未如其父母如初發心菩薩以乘如來一切智乘初生佛家與佛同智唯神通道力未如以待大悲萬行長養故雖長養功終法不異也時不遷也終不出初發心時力用功畢如龍女不出剎那際一生成佛是如善財一生得佛果是一生者無生也無生有十一諸蘊自體無生二諸見自體無生三空無生四性無生五時劫不遷無生六涅槃生死無生七說法音聲寂默無生八智慧分別無生九神通道力性自周遍無生十不出剎那際對現三世盡古今劫一切衆生前身無生有此十種無生故名一生當得菩提此經以十行十回向十地十一地法方便用資初發心佛果以資糧與佛果同時互為體用相資故號為覺行嚴以果資行令行無著以行資果大悲大用得辦如三乘意生身菩薩推佛果在十一地後三祇劫終以地前三賢為資糧十地為見道佛果在十一地三祇劫後如此教與三乘中五位行相一倍顛倒行相不同兜率天宮偈讚品已上各說一法共成十回向心或但說有衆生著有或但說無衆生著無如經星宿幢菩薩頌云衆生妄分別是佛是世界了達法性者無佛無世界如下文法幢菩薩頌云寧可恆具受一切世間苦終不遠如來不覩自在力十回向品此品何故名為十回向答曰以十住初生諸佛智慧家雖有第七方便波羅蜜成大悲行然為創始應真出世心多十行位中以智眼慧眼法眼觀根利生化令出俗此十回向位中明前二位出俗心多大悲行劣以將十住初心所得諸佛之智慧十行之中出世之行門處俗利生回真入俗故名回向以此十回向位通前徹後總通收故又以表兜率天宮於諸三界此天殊勝何以故為世間三世諸佛皆在此天長菩提心滿向上化樂天他化天樂放逸故向上色界無色界天樂靜心多故已下夜摩忉利是著樂之處天非知足故又此天修三福德人之共生處故何者為三一修施二持戒三修定自餘諸天不修三福但修戒施二福是故餘天或多放逸或多樂靜是故上生經云樂欲長菩提心者來生此天是故此天說此十回向門回向有十法一以無作法回向有作法二以有作法回向無作法三以一法回向多法四以多法回向一法五於諸有法回向無法六於無法回向有法七以世間法回向出世間法八以出世間法回向世間法九以一切自性無回向以為方便有回向法十以一切有回向法以為自性無回向法為令滯有無者得自在故得大神通無法拘留故供養諸佛教化衆生一多同別皆得自在故云何為等法界無量回向云如法界無中邊回向心無中邊如法界無作者回向心無作者法界無來去遠近回向心無來去遠近法界如虗空回向智如虗空法界不思議回向智不思議法界無所依回向智無所依法界一切諸佛之所共住如無依智一切佛之所共住法界非三世及一切生滅時分所攝回向之智非三世時分所攝法界圓滿三世事業在於現前回向之智圓三世事業在於現前法界有無自在回向之智有無自在為令自他皆如法界無礙自在如諸佛故以是名為等法界無量回向大意令一切發菩提心者一如法界諸德用自在圓滿廣大無限離大小性不屬一二三百千萬等有限量故世間出世間大智大悲喜捨等法界衆生界故若不如是回向設求菩提但得二乘住寂菩提菩薩樂生淨土皆住門外三車露地白牛不當其分自他滯障悲敬不真知見不廣悲心不普心不廣大不稱無限法界若不如是以無限回向發願普為無限法界衆生即自住真門偏生淨土不依法界無礙垢淨平等無限同體大悲不成佛果故如是十回向均十信十住十行及十地十一地行門總在其中十地品此第六會他化自在天宮說何故名為十地品曰明如來以普光明智以成地體以諸菩薩雖登十住十行十回向不離此體故云十地此十地之法即通十信所信十箇佛果即以普光明殿所說十箇佛果不動智佛為初信故進修之中雖經十住十行十回向還將十信之中十箇智果以成十地之體十箇智佛以不動智佛為本不動智佛以普光明智為本普光明智以無依住智為本又無依住智以一切衆生為本如善財見彌勒菩薩彌勒菩薩還令善財却見初善知識文殊師利是其義也乃至五位滿不離初信之佛果以此十地之法通初徹末一際法門是故號名十地品且略言之十地之體若無十信能信自心初佛果者十地亦不成故十信之初心無十地十一地之佛果亦無成信心故始終總全是不動智之果故能信自心者亦佛果故所信佛果亦佛果故修行之身亦果佛故如是信心方得成信故信亦是佛悟亦是佛以不異佛智體用為進修故作此信時普見一切衆生所有心量皆從如來大智而有凡聖一體同一智慧無有二性如此經如來出現品云衆生種種樂及諸方便智皆依佛智起又云應信自心中常有諸佛出興於世轉正法輪從如是信已以方便三昧發生悟入現本智慧與佛契同名生如來智慧家為真佛子從此初住住佛所住種如來性名清淨智慧從此慧已經十住十行十回向位位之中配十箇所修行之人十箇世界國土位位之中以如來智生身等法界衆生界對現一切衆生前身非論意生身隨意所往也但以根本無明成一切智海一切世界一切處現形隨類應現不論於三界外別受變易生死但以智用善達心境智無礙性等法界性無去來性無造作性不見過去是凡夫未來是變易現在是分段有此心者皆是虗妄非正見故若斷惑中但以五蓋十纏十使繞為智用不於三界外別受變易之生死於毛孔微塵之內剎海凡聖如影同居焉得別有三界之內外也不變尚自本無焉能有別欣變化純以世間一切境界人天魔梵為一佛土而作佛事不於他方別有淨土也五蓋者一貪欲二瞋恚三睡眠四掉悔五疑十纏者一無慚二無愧三眠四悔五慳六嫉七掉舉八昏沉九忿十覆達智具悲此等用為智海為慈悲喜捨諸佛知見故為信解廣大受生廣大如隨好光明功德品天鼓所說悔除法以盡法界衆生數等善身口意舌悔除所有業障諸天問言云何悔除天鼓云觀業不從東西南北四維上下來而共積集身心乃至十方推求悉不可得天鼓如是為諸天衆說法之時百千萬億那由他佛剎微塵數世界兜率天子得無生法忍得十地位此位三生得十地果也若信解無作惡業者一生成佛如善財是也云一生者言見道無生性總是入法界無時之生故如三乘之教刊削屈曲理滯難成尚能信而為之此一乘法理智端直不剋不削達自根本無明便為不動智佛萬事自正以智利生即是佛故又將十回向廣大無限悲願會融令智用而無作行具而無依即普賢行具故世士大迷易成而功廣者即不信多劫曲修刊削難成功劣者反存其情畢竟多生還須歸此如此經中少起信樂獲得無邊廣大饒益三生者一過去久遠見道修行生二現在得果圓滿生三當來示現成正覺出世生總在樓閣之內如今現前無古今去來現在不可得故然亦不廢三生之相現在其中但以智知為隨俗利人故即三生也若約真論無發菩提心時無修行見道時無現生得果時無當來示成正覺時以三世及心量無性體故無安立故無處無依住故名為成佛時也若見自心有能發菩提心時當來成正覺時即為情識生滅不名發心時也以是義故信心及佛果總不離普光明殿乃至常行普賢無始終之行離世間品總不離普光明殿明因果同本故時復無體智復無依彌勒令善財却見初友文殊即明至果不移因善財念見文殊便聞普賢菩薩名及自見其身入普賢身明正覺之因不移行果三會總在普光明殿者明行因與果并普賢行滿總是一箇普光明無始終無依住自在大智故若衆生發菩提心者不見此智不名發心若心外見佛及取相求真者皆且作善未明發一切智心故經云乘一切智乘直至道場以乘普光明大智之乘還不出普光明大智道場名之為至是故發心先心難明此智難信信得即能入故夫證發心易先起信發心難信極即入位故如一生修有漏十善尚得生於天上得業報神通十念成就尚得往生淨土何況依智發心一生之後不得智體自在神通乎如西方淨土十六觀門總是作想想成由自報得神通何況達理智無依明淨遍照了身心無體內外見亡者乎以無住法隨無住智供佛利生如是修行何慮不獲大力神通論主頌曰普光明智等虗空虗空但空智自在從初發心依此生究竟還依此處滿是故三會光明殿皆以法界本普光明智為體用故菩提有五一小乘菩提二二乘菩提三空觀行六波羅蜜菩薩菩提四修十種相似真如觀修十波羅蜜有十真如障十一種粗重二十二種愚癡菩提五依十種如來智修十波羅蜜以無盡劫為一剎那際契無盡多生為一生一念迷解即佛智慧菩提如起信論說或云超劫成佛云我於無量劫修行成佛道者皆為懈慢衆生作無數方便或云要經三僧祇方得成佛者此皆逐世情說為三乘不依根本智發心若以智論之不隨迷情直以不可數阿僧祇劫以為無時以此無時假施設一剎那際攝無限三世無限三世劫總不出一剎那際經云智入三世而無來往如是三僧祇劫情有智無以智收情情居智內無量劫情在剎那際智中若取情虗智實元來總無時體始終無時可遷二事校量只可從實不從虗也經云悉從他方世界來集者以從十回向法來成十地名之他方故法界性中無別他方以未至位處名他方故八正道者正見正思惟正精進正念正定正語正業正命是也解云以入佛智名為正見以智觀法名正思惟依五位法而行進修名正精進常與智合不與情俱名為正念心無生滅而能發起諸佛智慧及起無量大神通力名為正定善能分別人天外道三乘一乘邪見正見邪定正定邪行正行名為正語善簡自他一切邪業善顯佛智慧等一切衆生同共有之名為正業令一切衆生人天外道世間生死及三乘出世解脫法門皆令回向如來根本一切智心本無情動名為正命如三十種廣大志樂法行雖廣是一佛智印非前後故故此十地法返成前十住十行十回向法非是此十地別有法來猶如蘿蔔從根生葉復以葉滋根亦如種穀以果生苗苗熟果成還初果也如善財見慈氏如來慈氏如來還令却見文殊明果不離因中果也又如人初生至三十而長但以長初生為大故非別有大來又初生至老大時無先後也以智為先導非情所收無先後異也雖立升降差殊但明一法界智中階級非如情見階級故三乘之種不體會法華經會權就實之意返說是化要經三祇劫方得成佛此是法界大智宅外門前之見猶住草菴且免三界粗苦之樂得三種意生身住火宅門外權設三車是以几案有憑據之乘以淨土穢土有二別故須改三乘之見網眇目者令圓滅存留惑及淨穢土之漏身始可稱智身之廣大論主乃為頌曰無限智悲成佛德佛以智悲成十地還將十地成諸位前後五位加行門不離十地智悲起是故十住初發心發心即入十地智雖然五位方便殊只為成熟十地智猶如迅息飛虗空不廢遊行無所至亦如魚龍游水中不廢當游不離水如是五位行差別不廢差別不離智所有日月歲差別以智法印無別異論主又頌曰一切衆生金色界白淨無垢智無壞智珠自在內衣中只欲長貧住門外廣大寶乘住四衢文殊引導普賢扶肥壯白牛甚多力一念遍遊無卷舒如是寶乘不能入但樂勤苦門前立不覺自身常住中遣上恆言我不及無明暗覆者覆謂覆蓋自己如如之本智故為智自無性逐境緣迷故隨迷苦極自覺迷除迷我成妄覺我成智覺之與迷本無二性為智之與迷各無自性皆悉從緣而有為根本智自性無性不自了知是智非智但隨境起逐境情生起於我見非至苦極厭苦求真若自未厭苦源設聖者化時不信從斯發起有二種發心一者久從生死苦厭苦發心名自覺聖智亦名佛智自然智無師智二依先覺勸令知苦本方能發心若言要依先佛發心即同外道常見即先覺者以誰為師展轉相承不離常見若有古時常佛為展轉之師即古佛自體自真不隨妄者即不可踐其古跡為真自常真不可以真隨生死故即生死是常生死佛自是常佛故若也衆生定有生死者生死自常生死不可得成真故此是斷見此二種俱非不離斷常也為一切衆生生死無性本無生死橫計生死本非生死一切諸佛本無自性實無菩提亦無涅槃而衆生妄謂諸佛有菩提涅槃若有衆生能如是知者名為發心名為諸佛名為見道而能開悟一切衆生是達無明者無明本無諸佛亦無名為覺者但以無依無住無體無性妙智能隨響應對現色身教化衆生名為大悲不可有得有證有欣有厭有取有捨有古有今有真有假發菩提心也如是發菩提心不為長夜無明之所覆故異相門中總有五十種菩提大體總相但約此十地差別菩提以為升進之大體從此十種地中菩提總以五種菩提為大體五種菩提者一空無相菩提二普光明無依住智菩提三大願能起大智大悲廣利衆生菩提四以其大悲能隨染淨不染淨菩提五智悲萬行圓滿無作菩提菩提者覺也云無上者但一乘非三乘也一空無相菩提三乘及一乘共得二普光明無依住智菩提唯一乘非三乘也一乘菩薩十住之初住此智名住佛所住生如來智慧家以此智地進修諸行隨差別智隨差別行不離初心所得普光明無依住智地以明發心畢竟不別如是發心先心難者得此智地難故三大願能起大智發生大悲廣利衆生菩提明諸法不自生即藉大願而起智成悲亦不從他生明智之及願無自性故不共生者法無和合故不無因者要因願起智行慈悲故故云佛種從緣起是故說一乘又此八地菩薩無功之智現前猶恐滯寂以第八願波羅蜜防之令憶念本願故四以其大悲能隨染淨不染淨菩提明前六地行六波羅蜜得出世間及世間並出世間菩提至此第七地以出世間及世間並出世間菩提用入世間同一切凡夫事業成大慈悲行雖同俗染以智無染性處世無著如蓮華處水恆生水中不濕故又明智體無依無性能隨大願處於俗流不屬染淨而自在故此之第七地法門非二乘所及亦非行六波羅蜜欣厭煩惱菩薩所知五智悲萬行得圓滿無作菩提若以總相同相門智體不異時亦不異即十住初心總具若以別相門中十住十行十回向得一分如來同體大智得一分如來同體之行得一切如來回向大願和融悲智從初地至第六地依前三賢位中之法長養成就令得出纏雖有慈悲是願令一切衆生出世之悲至此第七地將前出世解脫之心方始處纏不汙從三空無作之門入世間同纏方便之行猶有無作有作二種習氣仍在有行有開發至第八地第十地悲智圓滿任物利生無作方終至第十一地所利衆生等同法界隨根隨時對現色身無生不利不為而用為普光明智與一切衆生虗妄心是一性體故故能知一切衆生所作業行隨而應現第八地初得智慧無功用第九地明無功用智說教自在第十地明無功用中智悲總圓滿故十地是此位中之果明因行難發果行易成如水入流任運至海何況此行不出海中經云佛子譬如有世界一處雜染一處純淨是二中間難得過者明六地純淨七地純染於此二位滯於染淨難可得過意明以大悲大智不離此二行教化一切衆生而令究竟成大菩提具一切智智以加行智顯發根本智以根本智觀照力成差別智以智無依不受恆垢以垢無依不能染淨但為大悲緣起方便利生耳九次第定者名滅盡定此滅定有四種一聲聞滅定以四諦觀識心滅現行煩惱及智亦滅二緣覺滅定十二緣滅現行煩惱滅智亦滅三權教菩薩觀四諦十二緣明苦空無常無我無人無衆生壽者性相空寂都無所縛行六波羅蜜生於淨土或以隨意生身住於娑婆或言以慈悲留惑住世設入寂定但隨無相理滅不得法界大用滅故四如一乘菩薩依如來普光明智發心但達根本無明是一切諸佛根本普光明智以此大智為進修之體所有寂用皆隨智門一身寂多身用多身寂一身用同身寂別身用別身寂同身用如是同別寂用自在等空法界無礙重重十定品此第八會在普光明殿說十定法門也第七會在三禪天說十一地法門其文未來如來出現品明佛出興出世人纏二行圓滿文殊是主出纏智慧普賢是主入俗行周離世間品是一切諸佛皆自成佛果後恆以自己果行常行利生亦名為利世間品不可作遠離之離一切諸佛以此法界大智慧而成正覺亦名普光明大智慧殿法界品是菩提智境究竟之果此乃都該一部也以三昧力三求推覓覓普賢者明三昧雖有慈悲是出世心多以此不見十一地普賢入俗利生之門三求推覓方見普賢者明從十地升進入普賢行果之位成普賢寂用自在門故是故下文以如意摩尼珠王能隨所求及與物同色不失自珠之德明常以如來自果一切智王不壞菩薩種種方便之行隨諸衆生種種樂欲皆隨引之使令得樂大意明十信已後十地已前以普賢行成法身根本智得出世中差別智十一地中以法身根本智純成處生死中無限大用普賢門與一切衆生妄念齊等同想同用隨彼解脫以是如來令想念普賢離世間品是佛果後普賢行云周遍觀察不見普賢及所坐之座者明從初十信十住十行十回向十地已乘普賢行升進多求如來解脫悲智出世間心成佛自在無作道圓滿已是周遍十地佛果後普賢行及所有三昧純是善入世間無求出世佛果故三昧三求不見純是大悲無有自利之行即不相見以十地佛果已前行普賢行有自利利他之心求出世解脫故以十一地行普賢之行不求自己解脫純是利生之行故明自解脫道已滿足無所希求故於十一地但為饒益一切衆生無蘊積已自功故是故以將十地已前自利利他普賢行求十一地中普賢行未及見是故大衆周遍觀察竟不得見普賢身及座也但入觀者善得其宜先須入無思無心定得法身之理稱虗空之性方可方便起智興供養心須得自在稱理智而為之若也但修空無相法身即於智不能起用若但一向生想不見無相法身即純是有為十通品如此十定十通十忍等是十地位終入於生死利衆生之方便亦是十住十行十回向十地十一地五位通修十忍品若以權教菩薩地前為伏忍地上見道方入順無生忍若以一乘通十住初心得憶念諸佛智慧光明門名生佛智慧家名得音聲忍亦名順無生忍前已有十通此乃約通有忍若無神智通達但成伏忍法忍不生十地已前以忍成通十一地內以通成忍亦是十定十通十忍是一德之功用故阿僧祇品前十定十通十忍三品明該括因果初終始末不遷剎那之際如仁王經一念中具九十剎那一剎那經九百生滅如是三世佛果及普賢方便行總時不遷故但以剎那為量不立生滅之名設論生滅但於剎那內安立更無長短自此以下至如來出現品明佛果之中三業廣大此品何故如來自說明此數法廣大下位智所不及唯佛能究竟故此是佛果二愚非至差別智滿方了即此阿僧祇品隨好光明功德品二品法是如來自說有餘五位各各隨位菩薩自說十信菩薩說十信法十住菩薩說十住法以此此品非至差別智果滿佛位方明還是如來自說故所問之主還是如來心智自在之王方堪能問又此數法智滿佛果方終以智遍故任運而知非是加行作意而知以此佛自說故壽量品前品既是阿僧祇此即合便有壽量說此品教主以心王菩薩說者明佛壽量以心王為體以心王表命自在故即明如來心王之命隨根延促長短任物自在而實如來無壽命者無長短者約未悟者作節級令知如來壽量無盡以少顯多以短顯長若不如是云何能知佛之壽量然實如來無長短命如來壽命如根本智菩薩住處品迦葉彌羅國舊云罽賓國此翻為阿誰入昔此國未立之時有大龍池人莫敢近後有一羅漢見其形勝宜人居止乃從龍乞容一膝地龍乃許之羅漢化身令大其膝漸滿池中龍以言信捨之而去羅漢以神力乾竭其水令百姓居之建立屋宅衆人咸言我等不因聖師阿誰得入此處故從此語以安其名佛不思議法品此品依如來身口意三業得名云何名不思議想心不能及名為不思情識名言不能及故言不議明至此佛果三業用中真俗法滿足故故號佛為無上兩足尊也明三種業用二智遍周總攝諸法故青蓮華是真智蓮華藏是隨俗智以真俗二智自說自己三種業用廣大自在不思議如來十身相海品前品說自佛三業二智入不思議際遍周廣大無限饒益衆生此品約三業二智入不思議智中之報身故如來隨好光明功德品前品已明十身相海有十蓮華藏世界微塵數相海莊嚴其身此品約佛身相中隨相無性功德表以法身妙慧性光引接一切衆生故立此品何故如來自說此品明佛果中二愚一數法廣大愚二隨好光明功德愚此二位法非諸菩薩智所及至佛果滿方明阿僧祇品是數法廣大隨好光明功德品是法身智身自體無性無依功德此二法皆非依行作得不由普賢行之所及但與行為依止故是當普賢行滿佛果位終之法是故如來自說明當位自說自位法門令後學者不惑意明法身及根本智不屬行所修生唯大悲及差別智須依此根本智此是一切菩薩行之恆佛果故故以此如來自說若無此智德之果一切衆行皆無常故如虗空體全與諸有而作全體然虗空不屬修生普賢行品前品果極性智先明以利衆生此品明普賢行能利物故有理智無行理智乃處俗不圓有行無理智其行無由出俗故理行體徹方成不二自在之門經云知一切衆生心行智者此名他心智以自無心自他障絶即自心與一切衆生心一體無二以此能知一切衆生心故以自心衆生心無二故即身無內外諸見無內外見故即無邊世界虗空界平等自心與虗空界平等即無大小遠近中間既自心無大小遠近中間即智恆遍滿十方世界而無來往既智恆遍滿十方世界而無來往即能隨根對現色身自在既能隨根對現色身自在即應根說法自在即一身多身相入自在如來出現品何故名為如來出現品為從第二會普光明殿設十信心以不動智佛為初信首從十信中信進修行不離根本智不動智體起大悲願行修差別智成大慈悲至此位滿名為如來出現品明前初會菩提場中出現始成正覺者是毗盧遮那佛出現此品中出現是菩薩進修五位行解智悲位滿出現故名出現品大意明文殊普賢是成就佛果理智行門還令說佛出現之法佛是根本智自體無言凡是有言皆是差別智如是文殊普賢是古今諸佛之共法若初發心者從初發信心已來皆悉遊履此文殊普賢二行至此方滿故如是進修皆不離初信中不動智佛十智之體故以明時不動智不動行不動能遍遊十方不動一入多不動多入一不動小入大不動以此五位升進或升天表法或身遍十方終不離普光明殿本智之體一剎那際是故此自果已終之法還不離說信心之處普光明殿說還如善財至慈氏如來還見文殊信心初友入普賢身相似恐後學者迷法一一以善財將行表之令易解故至此如來出現品明經五位加行進修功熟方論流通付囑若論根本法界性自不迷性自不悟無出無沒不成不壞無流無通也此付囑流通意從凡夫未悟令加行功終處說故如法界品直論一切諸佛功終之果是自流通不須付囑如此如來出現品明信心者五位加行功終之力方始純實創登功畢二行圓周便說付囑流通明果初滿故方入常道法界非古今始末之量也流通此法名曰流通即法界品是喻如來出現身心智慧十無量事境界皆是非喻為喻略而少分是心智路絶任不思議無性無作無限自在之功用非言量譬喻所表及故如此品付囑流通中此法門不入餘衆生手者樂學二乘三乘聲聞緣覺樂空無我願生淨土者是餘衆生以未回心住變易生死是餘衆生故若有大心凡夫及三乘有回心者佛所付囑名曰流通設令於此法聖位菩薩自所演說無凡夫樂學不名付囑不名流通又舉輪王太子具足王相者王命終後所有七寶不散滅喻便以此子能治王正位故若無此子王命終後此諸寶等七日中悉皆散滅佛子此經珍寶亦復如是不入一切餘衆生手唯除如來法王真子生如來家種如來相諸善根者若無此等佛之真子如是法門不久散滅明知但令凡夫發心悟入設有聖者常說無凡夫樂修悟入其法自滅言無凡夫修行言滅法無生滅經云種如來相諸善根者明如來以解脫智慧為家如一念無念身心諸見已亡便生如來無性妙理正智慧家如來見一切法無性為性無相為相不壞相而無相明智境相自真故名種如來相明自心智境界非生住滅是如來相明自心智慧等一切諸佛及以一切衆生智慧皆一性無性一相無相如虗空界能隨衆生性欲樂現如影身生無來處滅無去處達心境如幻是如來相達如斯法者是生在佛家種如來相如是凡夫聞此法已修學如來如是真智慧種名為佛種不斷名曰付囑流通離世間品此第九會在普光明殿說如來出現品明自己覺行圓滿故十方諸佛同號普賢以明十住十行十回向中但一分覺心能治一切煩惱中一分粗惑行得一分慈悲雖踐普賢一分行跡然未全具普賢行滿故隨位佛果但同號為月為眼為妙至如來出現品明覺行齊圓故是以不可說佛剎微塵數佛同號普賢佛是以初會所說法門皆令普賢說法以體從用第二會以普賢智用從體直至十地皆是以用從體且令成其根本智使圓明然後十地終捨三昧涅槃樂如稠林煩惱具普賢大用始得稱周設教於生死中自在發心之士深須得意方堪修道作前後多生尋求便不相應也法界品此第十會在給孤獨園說此品何故名為入法界明信樂者從迷創達名之為入身心境界性自無依名之為法一多通徹真假是非障亡名之為界又達無明識種純為智用是無依智之境界名為法界又以一好音遍聞利海以一纖毫量等無方以大小見亡物我同體識謝情滅智通無礙名為入法界問何故前餘會之首皆云不離菩提之場普光明殿又三會同居普光明殿此之法界一會何故直言爾時世尊在室羅筏國逝多林給孤獨園者答曰重敘三會同在普光明殿者明信進五位修行已終不移普光明根本不動智體此法界會直言在室羅筏國逝多林園明自己成佛果滿度衆生行故在人間國邑園林化二乘聲聞緣覺及淨土菩薩純以自在法界為體無五位菩提行可修亦無差別智普賢願行可學總遍十方利衆生法不須和會也以此直言逝多園如衆流入海諸河名亡但以法界為名入法界品善財童子遍求善知識五十三人以表五位三種因果法身中根本智普賢差別智中行於此二中無所住智名之為佛此佛文殊師利普賢菩薩與五十箇善知識行而作因果而自無因果為自佛果位中無所修無所行故俱與五位中修行者作治染淨二障習氣生熟處說名因果然法身理智萬行自無因果但以五位中加行治惑習氣而立如來因果之名問曰何故但云求菩薩道不云學菩薩心答曰為菩提無所得無所修無所學無所行是故但求菩薩道學菩薩行大意初發心住以無念無作三昧加行方便助顯菩提以菩提無體無性與一切諸行作無住之緣以此求菩薩諸行以諸行即菩提無體性故若於行外別修菩提即聲聞緣覺及空觀菩薩菩提非一乘文殊普賢理智萬行悲願自在菩提以是如來對權教菩薩說諸行無常是生滅法以權教菩薩修析法明空觀破三界有未明三界諸有即菩提用故以此一乘實教菩薩但求菩薩道行菩薩行即體用總該不別求也若也別求菩提即體用各別二見恆存不名乘不思議乘故是故但求菩薩道無別菩提也以明菩提無求無發心無所行無處所無問無答無得無證行一切行具普賢道是菩提大用圓滿故頌云若有諸菩薩不厭生死苦則具普賢道一切無能壞明以生死苦為菩提即無所壞若離生死苦修菩提行發菩提心即有所壞何以故即有生死涅槃染淨二障所壞即有是非二見斷常所壞自佛果外一向別緣身外他佛而求真者本非修道見道人也若自行位果及者諸佛自相應也以自佛果相應故設強求而得見者是暫化現也非自行所及故此五位十地位內佛果一一約修行智慈所及所行所到處施設佛名不可如情要期立志暫見佛化身也一生者無生中生也非三世前後生故從此摩耶夫人表十一地初門已後九箇善知識總明從大慈悲為母體皆從母行以智幻生悲智遍周十方隨俗遍周非如十地已前滯障不達此之十一地但顯修行十一地行滿此普賢十一地位顯德遍周行備塵俗無求出世自天主光已去總是同世凡流不摽神相異狀與世人一種表自出世道滿無更求解脫離染離淨之心但以乘法性船張大慈悲帆以大智為船師順本願風吹諸波羅蜜網常遊生死海漉一切衆生有著之魚安置無依普光明之智岸常住一切幻住萬行功德法界無礙寶堂如下慈氏所居樓閣是又令觀身觀心如夢如影者令達其相達性達相如影通同無二便入智幻生門是見摩耶夫人也如善財童子問摩耶夫人得此解脫其已久如摩耶答言善男子乃往古世過不可思議非最後身菩薩神通道眼所知者唯佛能知故意明不可以時分知不可以劫數度也要須以佛智印冥同古今量盡始末見亡者能知其發心得法之久近若立始終之見者設將無盡剎微塵比之成數無由可悉設使展轉無盡無盡剎塵比之成數亦不可悉數亡計盡智現方知即無以數法算其遠近若以算法盡無盡劫算毛孔中虗空量了無得其邊際故以虗空無壽量故以此無量為得時也有一惡魔名金色光與其眷屬無量衆俱至菩薩所彼大威德轉輪王已得菩薩神通自在化作兵衆其數倍多圍繞道場諸魔惶怖悉自奔散意明惡魔名金色光者法身智境真假一相一向離垢菩薩未明心境平等要假一切智王明觀心境理徹無二心境如幻一切境界幻智幻生即於境不迷妄想心魔總唯法界皆為佛事名為奔散善財童子合掌恭敬已下至卷末明善財申己已發大菩提心慈氏為讚菩提心善根功力不思議分意明一切神通道力菩薩萬行皆以菩提心為根本滅生死截苦流淨八萬四千煩惱門顯成一切智海皆以菩提心為根本以菩提心無依無住無有體性生滅可得菩提心無依故智亦無依智無依故一切所作皆無作者依住可得以此生死業亡唯智自在大悲萬行從智而生智體無依萬行如化利生如幻神通道力如空中月普現衆水智體不去衆生心水不來隨自業淨與智同體隨淨淺深現智各異非此非彼若欲見十方諸佛如來智海但自淨十二有支業緣佛智自現但求他勝境自法便隱慈氏菩薩彈指出聲其門即開者明塵亡執去法門自開善財入已其門還閉者以智無內外中間無出無入無迷無證名為還閉經云菩提心是菩薩生處般若為生母方便以為父檀度為乳母持戒為養母忍辱為莊嚴精進為養育禪定為浣濯善友為教授師菩提為伴侶衆善為眷屬菩薩為兄弟以如是等是菩薩生處弟子董廣𥌓捐資募鋟華嚴合論四卷奉薦先考龍山府君先妣茅宜人夙障消隕即生淨土三寶證明者
